const fmtDate = ds => !ds ? "—" : new Date(ds+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
const fmtTs   = iso => iso ? new Date(iso).toLocaleString("en-GB",{dateStyle:"short",timeStyle:"short"}) : "—";
const isWeekend = ds => { if (!ds) return false; const d = new Date(ds+"T00:00:00").getDay(); return d===5||d===6; };
const dsOf  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

function useWindowSize() {
  const [width, setWidth] = useState(window.innerWidth);
  useEffect(() => {
    const handler = () => setWidth(window.innerWidth);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return { width, isMobile: width < 640, isTablet: width < 1024 };
}

function AdminLogin({ onLogin, onBack }) {
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const inp = {width:"100%",border:"1px solid #e5e7eb",borderRadius:12,padding:"11px 14px",fontSize:14,background:"#f9fafb",outline:"none",boxSizing:"border-box"};
  function submit() {
    if (!email.trim()){setErr("Please enter your email.");return;}
    if (email.trim().toLowerCase()!==ADMIN_EMAIL){setErr("Unauthorised email address.");return;}
    if (pwd!==ADMIN_PWD){setErr("Incorrect password.");return;}
    onLogin(email.trim());
  }
  return (
    <div style={{minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",fontFamily:"system-ui,sans-serif"}}>
      <TopBar onBack={onBack}/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{width:"100%",maxWidth:380}}>
          <div style={{textAlign:"center",marginBottom:24}}>
            <h2 style={{color:"#fff",fontWeight:800,fontSize:22,margin:0}}>Admin Login</h2>
            <p style={{color:"rgba(255,255,255,0.45)",fontSize:13,marginTop:6}}>BE – Warehouse Appointments</p>
          </div>
          <div style={{background:"#fff",borderRadius:20,padding:24,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:10,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Email</label>
              <input type="email" style={inp} value={email} placeholder="admin@bapcoenergies.com" onChange={e=>{setEmail(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:10,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Password</label>

            </div>
            {err && <p style={{fontSize:12,color:"#dc2626",background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 12px",margin:"0 0 12px"}}>{err}</p>}

        </div>
      </div>
    </div>
  );
}

const BLANK = {supplierName:"",supplierEmail:"",date:"",time:"",totalOrders:"",totalLines:"",poNumbers:[],needsEquipment:null,offloadingEquipment:[],storageLocation:[],additionalNotes:""};

function SupplierForm({ onSubmit, onBack, appointments }) {
  const { isMobile } = useWindowSize();
  const [f,setF]=useState(BLANK);
  const [done,setDone]=useState(false);
  const [dateErr,setDateErr]=useState("");
  const [poVal,setPoVal]=useState("");
  const poRef=useRef();
  const inp = {width:"100%",border:"1px solid #e5e7eb",borderRadius:12,padding:"11px 14px",fontSize:14,background:"#f9fafb",outline:"none",boxSizing:"border-box"};

  function set(k){return v=>setF(p=>({...p,[k]:v}));}
  function setE(k){return e=>set(k)(e.target.value);}
  function toggleStorage(loc){setF(p=>{const c=p.storageLocation;return{...p,storageLocation:c.includes(loc)?c.filter(x=>x!==loc):[...c,loc]};});}
  function toggleEq(eq){setF(p=>({...p,offloadingEquipment:p.offloadingEquipment.includes(eq)?p.offloadingEquipment.filter(x=>x!==eq):[...p.offloadingEquipment,eq]}));}

  const today = todayStr();
  function isSlotPast(slot,dateVal){const d=dateVal!==undefined?dateVal:f.date;if(!d||d>today)return false;if(d<today)return true;const now=new Date(),parts=slot.split(":");const slotMins=parseInt(parts[0],10)*60+parseInt(parts[1],10);return slotMins<=now.getHours()*60+now.getMinutes();}
  function slotCount(slot){if(!f.date)return 0;return(appointments||[]).filter(a=>a.date===f.date&&a.time===slot&&a.status!=="rejected").length;}

  const slotFull = f.time && slotCount(f.time)>=2;
  const declared = parseInt(f.totalOrders,10);
  const tagCount = f.poNumbers.length;
  const hasDeclared = f.totalOrders!==""&&!isNaN(declared);
  const mismatch = hasDeclared&&declared!==tagCount;
  const valid = (f.supplierName&&f.supplierEmail&&f.date&&!dateErr&&f.time&&!slotFull&&hasDeclared&&!mismatch&&tagCount>0&&f.totalLines&&f.storageLocation.length>0&&f.needsEquipment!==null&&(!f.needsEquipment||f.offloadingEquipment.length>0));

  function handleDate(e){const v=e.target.value;set("date")(v);if(v<today)setDateErr("Cannot book a past date.");else if(isWeekend(v))setDateErr("Friday and Saturday are non-working days.");else setDateErr("");if(f.time&&isSlotPast(f.time,v))set("time")("");}
  function addPO(raw){const v=raw.trim().toUpperCase().replace(/,/g,"");if(!v||f.poNumbers.some(t=>t.toUpperCase()===v)){setPoVal("");return;}set("poNumbers")([...f.poNumbers,v]);setPoVal("");}
  function removePO(t){set("poNumbers")(f.poNumbers.filter(x=>x!==t));}
  function onPoKey(e){if(["Enter",",","Tab"].includes(e.key)){e.preventDefault();addPO(poVal);}else if(e.key==="Backspace"&&poVal===""&&f.poNumbers.length>0)removePO(f.poNumbers[f.poNumbers.length-1]);}

  if(done) return (
    <div style={{minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",fontFamily:"system-ui,sans-serif"}}>
      <TopBar onBack={onBack}/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{textAlign:"center",maxWidth:380}}>
          <div style={{width:72,height:72,background:"#d1fae5",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:36}}>✅</div>
          <h2 style={{color:"#fff",fontWeight:800,fontSize:22,margin:"0 0 8px"}}>Request Submitted!</h2>
          <p style={{color:"rgba(255,255,255,0.55)",fontSize:13,marginBottom:24}}>Your appointment has been submitted for review. A confirmation will be sent to your email.</p>
          <div style={{display:"flex",flexDirection:isMobile?"column":"row",gap:12,justifyContent:"center"}}>
            <button onClick={()=>{setDone(false);setF(BLANK);setDateErr("");setPoVal("");}} style={{padding:"12px 22px",background:A,color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>Submit Another</button>
            <button onClick={onBack} style={{padding:"12px 22px",background:"rgba(255,255,255,0.1)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>Back to Home</button>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",fontFamily:"system-ui,sans-serif"}}>
      <TopBar onBack={onBack}/>
      <div style={{maxWidth:640,width:"100%",margin:"0 auto",padding:isMobile?"20px 16px":"28px 20px"}}>
        <h1 style={{color:"#fff",fontWeight:800,fontSize:isMobile?20:24,marginBottom:4}}>Book a Delivery</h1>
        <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:20}}>All requests are subject to warehouse approval.</p>
        <div style={{background:"#fff",borderRadius:20,padding:isMobile?20:28,display:"flex",flexDirection:"column",gap:18}}>

          <div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Supplier / Company Name *</label>
            <input style={inp} value={f.supplierName} onChange={setE("supplierName")} placeholder="e.g. Gulf Trading Co."/>
          </div>

          <div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Email Address *</label>
            <input type="email" style={inp} value={f.supplierEmail} onChange={setE("supplierEmail")} placeholder="dispatch@company.com"/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
            <div>
              <label style={{display:"block",fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Delivery Date *</label>
              <input type="date" min={today} value={f.date} onChange={handleDate} style={{...inp,borderColor:dateErr?"#f87171":"#e5e7eb"}}/>
              {dateErr ? <p style={{fontSize:12,color:"#dc2626",margin:"5px 0 0"}}>⛔ {dateErr}</p> : <p style={{fontSize:11,color:"#9ca3af",margin:"5px 0 0"}}>Sun – Thu only</p>}
            </div>
            <div>
              <label style={{display:"block",fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Delivery Time *</label>
              <select style={inp} value={f.time} onChange={setE("time")}>
                <option value="">Select a slot…</option>
                {SLOTS.map(t=>{const taken=slotCount(t),full=taken>=2,past=isSlotPast(t);return <option key={t} value={t} disabled={full||past}>{t+(full?" — Full":past?" — Passed":taken===1?" (1 remaining)":"")}</option>;})}
              </select>
              {slotFull && <p style={{fontSize:12,color:"#dc2626",margin:"5px 0 0"}}>⚠ Slot fully booked.</p>}
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
            <div>

function CalendarView({ appointments, isMobile }) {
  const TODAY = new Date();
  const [view,setView]=useState("monthly");
  const [cur,setCur]=useState(new Date());
  const [sel,setSel]=useState(null);
  const approved = appointments.filter(a=>a.status==="approved");
  function navigate(dir){setCur(c=>{if(view==="daily")return addDays(c,dir);return new Date(c.getFullYear(),c.getMonth()+dir,1);});}
  function forDate(d){return approved.filter(a=>a.date===dsOf(d)).sort((a,b)=>a.time.localeCompare(b.time));}
  function isToday(d){return dsOf(d)===dsOf(TODAY);}
  function calTitle(){if(view==="monthly")return cur.toLocaleString("default",{month:"long",year:"numeric"});return cur.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}

  function renderMonthly(){
    const yr=cur.getFullYear(),mo=cur.getMonth(),daysInMonth=new Date(yr,mo+1,0).getDate(),sc=(new Date(yr,mo,1).getDay()+6)%7,total=Math.ceil((sc+daysInMonth)/7)*7;
    return(
      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",flex:1}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:P}}>
          {(isMobile?["M","T","W","T","F","S","S"]:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]).map((d,i)=>(
            <div key={i} style={{textAlign:"center",padding:isMobile?"8px 0":"10px 0",fontSize:isMobile?10:11,fontWeight:700,color:i>=4?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.8)"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {Array.from({length:total},(_,i)=>{const dayNum=i-sc+1,valid=dayNum>=1&&dayNum<=daysInMonth,date=valid?new Date(yr,mo,dayNum):null,apts=date?forDate(date):[],isOff=i%7===4||i%7===5,today=date&&isToday(date);return(
            <div key={i} style={{minHeight:isMobile?52:90,borderRight:"1px solid #f9fafb",borderBottom:"1px solid #f9fafb",padding:isMobile?4:6,background:isOff?"#f9fafb":"#fff"}}>
              {valid && (
                <div>
                  <div style={{width:isMobile?20:26,height:isMobile?20:26,borderRadius:"50%",background:today?A:"transparent",color:today?"#fff":isOff?"#d1d5db":"#374151",display:"flex",alignItems:"center",justifyContent:"center",fontSize:isMobile?10:12,fontWeight:700,marginBottom:3}}>{dayNum}</div>
                  {apts.map(a=>(
                    <button key={a.id} onClick={()=>setSel(a)} style={{width:"100%",textAlign:"left",padding:isMobile?"2px 3px":"4px 6px",borderRadius:5,border:"1px solid #c7d2fe",background:"#eef2ff",fontSize:isMobile?9:10,fontWeight:600,cursor:"pointer",marginBottom:2,color:"#374151",overflow:"hidden"}}>
                      <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isMobile?a.time:a.time+" "+a.supplierName}</div>
                    </button>
                  ))}
                </div>
              )}
            </div>
          );})}
        </div>
      </div>
    );
  }

  function renderDaily(){
    const apts=forDate(cur);
    return(
      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",flex:1}}>
        <div style={{background:P,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{color:"rgba(255,255,255,0.5)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{cur.toLocaleDateString("en-GB",{weekday:"long"})}</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:isMobile?16:20}}>{cur.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}</div>
          </div>
          <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:99}}>{apts.length} appt{apts.length!==1?"s":""}</span>
        </div>
        <div style={{padding:isMobile?14:20}}>
          {apts.length===0 ? <div style={{textAlign:"center",padding:isMobile?32:60,color:"#9ca3af"}}>No approved deliveries on this day.</div> :
            apts.map(a=>(
              <button key={a.id} onClick={()=>setSel(a)} style={{width:"100%",textAlign:"left",padding:isMobile?14:16,borderRadius:12,border:"2px solid #e5e7eb",background:"#f9fafb",marginBottom:10,cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
                  <span style={{fontSize:isMobile?18:22,fontWeight:800,color:P}}>{a.time}</span>
                  <StoreBadge loc={a.storageLocation}/>
                </div>
                <div style={{fontWeight:700,fontSize:14,color:"#111827",marginBottom:2}}>{a.supplierName}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{a.totalOrders} orders · {a.totalLines} lines</div>
              </button>
            ))
          }
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:isMobile?16:24,display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{color:"#fff",fontWeight:800,fontSize:isMobile?18:24,margin:0}}>{calTitle()}</h1>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:12,margin:"3px 0 0"}}>{approved.length} approved · Fri & Sat non-working</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,overflow:"hidden"}}>
            {["daily","monthly"].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:isMobile?"7px 12px":"8px 14px",fontSize:12,fontWeight:600,textTransform:"capitalize",background:view===v?A:"transparent",color:view===v?"#fff":"rgba(255,255,255,0.6)",border:"none",cursor:"pointer"}}>{v}</button>)}
          </div>
          <button onClick={()=>setCur(new Date(TODAY))} style={{padding:isMobile?"7px 10px":"8px 14px",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,color:"#fff",background:"rgba(255,255,255,0.05)",fontSize:12,fontWeight:600,cursor:"pointer"}}>Today</button>
          <div style={{display:"flex",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,overflow:"hidden"}}>
            <button onClick={()=>navigate(-1)} style={{padding:"7px 12px",background:"transparent",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:16}}>‹</button>
            <button onClick={()=>navigate(1)} style={{padding:"7px 12px",background:"transparent",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:16}}>›</button>
          </div>
        </div>
      </div>
      {view==="monthly" && renderMonthly()}
      {view==="daily" && renderDaily()}
      {sel && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:50,padding:isMobile?0:16}}>
          <div style={{background:"#fff",borderRadius:isMobile?"24px 24px 0 0":"24px",padding:22,width:"100%",maxWidth:isMobile?"100%":420,maxHeight:isMobile?"85vh":"80vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div><StoreBadge loc={sel.storageLocation}/><h3 style={{fontWeight:800,fontSize:17,color:P,margin:"8px 0 2px"}}>{sel.supplierName}</h3><p style={{fontSize:12,color:"#6b7280",margin:0}}>{sel.supplierEmail}</p></div>
              <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#9ca3af"}}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[["Date",fmtDate(sel.date)],["Time",sel.time],["Orders",sel.totalOrders],["Lines",sel.totalLines]].map(([k,v])=>(
                <div key={k} style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6"}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{k}</div><div style={{fontWeight:600,fontSize:13,color:"#111827"}}>{v}</div></div>
              ))}
            </div>
            {sel.additionalNotes && <div style={{marginTop:10,background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6"}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>Notes</div><div style={{fontSize:13,color:"#374151"}}>{sel.additionalNotes}</div></div>}
            <button onClick={()=>setSel(null)} style={{marginTop:14,width:"100%",padding:12,border:"1px solid #e5e7eb",borderRadius:12,fontSize:14,fontWeight:600,color:"#6b7280",background:"transparent",cursor:"pointer"}}>Close</button>
          </div>
        </div>

  );
}

function App() {
  const { isMobile, isTablet } = useWindowSize();
  const [page,setPage]=useState("landing");
  const [view,setView]=useState("dashboard");
  const [navOpen,setNavOpen]=useState(false);
  const [adminEmail,setAdminEmail]=useState("");
  const [appts,setAppts]=useState([]);
  const [config,setConfig]=useState({serviceId:"",templateId:"",publicKey:"",adminEmail:""});
  const [toast,setToast]=useState(null);
  const [rejectId,setRejectId]=useState(null);
  const [rejReason,setRejReason]=useState("");
  const [viewId,setViewId]=useState(null);
  const [loading,setLoading]=useState(null);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),4000);}

  function handleApprove(a){
    setAppts(p=>p.map(x=>x.id===a.id?{...x,status:"approved",updatedAt:new Date().toISOString()}:x));
    showToast("✅ Appointment approved");
    setLoading(null);
  }

  function handleRejectSubmit(){
    if(!rejReason.trim())return;
    const a=appts.find(x=>x.id===rejectId);
    setAppts(p=>p.map(x=>x.id===a.id?{...x,status:"rejected",managerComments:rejReason,updatedAt:new Date().toISOString()}:x));
    showToast("Appointment rejected");
    setRejectId(null);setRejReason("");setLoading(null);
  }

  function handleBook(data){
    setAppts(p=>[{id:"APT-"+String(p.length+1).padStart(3,"0"),supplierName:data.supplierName,supplierEmail:data.supplierEmail,date:data.date,time:data.time,totalOrders:Number(data.totalOrders),totalLines:Number(data.totalLines),poNumbers:data.poNumbers||[],offloadingEquipment:data.needsEquipment?data.offloadingEquipment:[],storageLocation:data.storageLocation,additionalNotes:data.additionalNotes,status:"pending",managerComments:null,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},...p]);
  }

  if(page==="landing") return <Landing onSupplier={()=>setPage("supplier")} onAdmin={()=>setPage("admin-login")} onTracker={()=>setPage("tracker")}/>;
  if(page==="supplier") return <SupplierForm onSubmit={d=>{handleBook(d);}} onBack={()=>setPage("landing")} appointments={appts}/>;
  if(page==="tracker") return <SupplierTracker appointments={appts} onBack={()=>setPage("landing")}/>;
  if(page==="admin-login") return <AdminLogin onLogin={e=>{setAdminEmail(e);setPage("admin");setView("dashboard");}} onBack={()=>setPage("landing")}/>;

  const pending = appts.filter(a=>a.status==="pending");
  const viewApt = appts.find(a=>a.id===viewId);
  const nav = [
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {id:"admin",label:"Admin Panel",badge:pending.length,icon:"📋"},
    {id:"calendar",label:"Calendar",icon:"📅"},
    {id:"emails",label:"Email Log",icon:"✉️"},
    {id:"settings",label:"Settings",icon:"⚙️"},
  ];

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",fontFamily:"system-ui,sans-serif"}}>
      <header style={{background:BG,height:isMobile?52:56,display:"flex",alignItems:"center",justifyContent:"space-between",padding:`0 ${isMobile?14:20}px`,borderBottom:"1px solid rgba(255,255,255,0.1)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {isMobile && (
            <button onClick={()=>setNavOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:20,padding:"4px 6px",marginRight:4}}>☰</button>
          )}
          <Logo/>
          {!isMobile && (
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:1,height:18,background:"rgba(255,255,255,0.2)"}}/>
              <span style={{color:"#fff",fontWeight:800,fontSize:12}}>BE – Warehouse Appointments</span>
            </div>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {!isMobile && <span style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>{adminEmail}</span>}
          <button onClick={()=>{setPage("landing");setView("dashboard");}} style={{color:"rgba(255,255,255,0.6)",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:500,padding:"6px 12px"}}>Logout</button>
        </div>
      </header>

      <div style={{display:"flex",flex:1,overflow:"hidden",position:"relative"}}>
        {isMobile ? (
          navOpen && (
            <div style={{position:"absolute",inset:0,zIndex:30,display:"flex"}}>
              <div style={{width:220,background:"rgba(7,17,76,0.98)",display:"flex",flexDirection:"column",padding:12,boxShadow:"4px 0 20px rgba(0,0,0,0.4)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                  <span style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600}}>Navigation</span>
                  <button onClick={()=>setNavOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.4)",fontSize:18}}>×</button>
                </div>
                {nav.map(item=>(
                  <button key={item.id} onClick={()=>{setView(item.id);setNavOpen(false);}}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"12px 10px",borderRadius:10,border:"none",cursor:"pointer",background:view===item.id?A:"transparent",color:view===item.id?"#fff":"rgba(255,255,255,0.55)",fontWeight:500,fontSize:14,marginBottom:4,textAlign:"left"}}>
                    <span style={{fontSize:16}}>{item.icon}</span>
                    <span style={{flex:1}}>{item.label}</span>
                    {item.badge>0 && <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:99}}>{item.badge}</span>}
                  </button>
                ))}
              </div>
              <div onClick={()=>setNavOpen(false)} style={{flex:1,background:"rgba(0,0,0,0.5)"}}/>
            </div>
          )
        ) : (
          <aside style={{width:isTablet?56:200,background:"rgba(7,17,76,0.97)",borderRight:"1px solid rgba(255,255,255,0.08)",display:"flex",flexDirection:"column",flexShrink:0}}>
            <nav style={{flex:1,padding:8,display:"flex",flexDirection:"column",gap:2}}>
              {nav.map(item=>(
                <button key={item.id} onClick={()=>setView(item.id)} title={isTablet?item.label:undefined}
                  style={{display:"flex",alignItems:"center",gap:isTablet?0:10,padding:"11px",borderRadius:10,border:"none",cursor:"pointer",background:view===item.id?A:"transparent",color:view===item.id?"#fff":"rgba(255,255,255,0.45)",fontWeight:500,fontSize:13,justifyContent:isTablet?"center":"flex-start",position:"relative"}}>
                  <span style={{fontSize:15}}>{item.icon}</span>
                  {!isTablet && <span style={{flex:1,textAlign:"left"}}>{item.label}</span>}
                  {!isTablet && item.badge>0 && <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:99}}>{item.badge}</span>}
                  {isTablet && item.badge>0 && <span style={{position:"absolute",top:6,right:6,width:7,height:7,borderRadius:"50%",background:"#fbbf24"}}/>}
                </button>
              ))}
            </nav>
          </aside>
        )}

        <main style={{flex:1,overflowY:"auto",background:BG,display:"flex",flexDirection:"column"}}>
          <div style={{flex:1}}>
            {view==="dashboard" && <Dashboard appointments={appts} setView={setView} isMobile={isMobile}/>}
            {view==="admin" && <AdminPanel appointments={appts} onApprove={handleApprove} onReject={id=>{setRejectId(id);setRejReason("");}} onView={setViewId} loading={loading} isMobile={isMobile}/>}
            {view==="calendar" && <CalendarView appointments={appts} isMobile={isMobile}/>}
            {view==="emails" && <EmailLog isMobile={isMobile}/>}
            {view==="settings" && <SettingsPanel config={config} onChange={setConfig} isMobile={isMobile}/>}
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",padding:isMobile?"12px 16px":"12px 28px",display:"flex",alignItems:"center",flexWrap:"wrap",gap:isMobile?10:24,justifyContent:"space-between"}}>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,flexShrink:0}}>Support</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:isMobile?10:20,alignItems:"center"}}>
              {[
                {icon:"📧",value:"Faisal.Janahi@Bapcoenergies.com",href:"mailto:Faisal.Janahi@Bapcoenergies.com"},
                {icon:"📱",value:"+973 6667 6797",href:"tel:+97366676797"},
                {icon:"📞",value:"17757483",href:"tel:17757483"},
              ].map(({icon,value,href})=>(
                <a key={value} href={href} style={{display:"flex",alignItems:"center",gap:6,textDecoration:"none",color:"rgba(255,255,255,0.45)",fontSize:12,fontWeight:500}}>
                  <span style={{fontSize:13}}>{icon}</span>
                  <span style={{color:"rgba(255,255,255,0.55)"}}>{value}</span>
                </a>
              ))}
            </div>
          </div>
        </main>
      </div>

      {toast && (
        <div style={{position:"fixed",bottom:isMobile?20:undefined,top:isMobile?undefined:16,right:16,left:isMobile?16:undefined,zIndex:99,background:P,color:"#fff",padding:"12px 16px",borderRadius:14,fontSize:13,boxShadow:"0 8px 30px rgba(0,0,0,0.3)",display:"flex",alignItems:"center",gap:10}}>
          <span style={{flex:1}}>{toast}</span>
          <button onClick={()=>setToast(null)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:16}}>×</button>
        </div>
      )}

      {rejectId && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:40,padding:isMobile?0:16}}>
          <div style={{background:"#fff",borderRadius:isMobile?"24px 24px 0 0":"24px",padding:22,width:"100%",maxWidth:isMobile?"100%":420}}>
            <h3 style={{fontWeight:800,fontSize:18,color:P,margin:"0 0 4px"}}>Reject Appointment</h3>
            <p style={{fontSize:13,color:"#6b7280",margin:"0 0 14px"}}>Supplier will be notified with this reason.</p>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Manager Comments *</label>
            <textarea value={rejReason} onChange={e=>setRejReason(e.target.value)} placeholder="e.g. The requested time slot is fully booked." autoFocus style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:12,padding:12,fontSize:14,resize:"none",height:100,outline:"none",boxSizing:"border-box",background:"#f9fafb"}}/>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>setRejectId(null)} style={{flex:1,padding:12,border:"1px solid #e5e7eb",borderRadius:12,fontSize:14,fontWeight:600,color:"#6b7280",background:"transparent",cursor:"pointer"}}>Cancel</button>
              <button onClick={handleRejectSubmit} disabled={!rejReason.trim()} style={{flex:1,padding:12,background:"#dc2626",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",opacity:!rejReason.trim()?0.4:1}}>Reject & Notify</button>
            </div>
          </div>
        </div>
      )}

        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:40,padding:isMobile?0:16}}>
          <div style={{background:"#fff",borderRadius:isMobile?"24px 24px 0 0":"24px",padding:22,width:"100%",maxWidth:isMobile?"100%":460,maxHeight:isMobile?"85vh":"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div>
                <div style={{fontFamily:"monospace",fontSize:11,color:"#9ca3af",marginBottom:4}}>{viewApt.id}</div>
                <h3 style={{fontWeight:800,fontSize:17,color:P,margin:"0 0 2px"}}>{viewApt.supplierName}</h3>
                <p style={{fontSize:12,color:"#6b7280",margin:0}}>{viewApt.supplierEmail}</p>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <StatusBadge status={viewApt.status}/>
                <button onClick={()=>setViewId(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#9ca3af"}}>×</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              {[["Date",fmtDate(viewApt.date)],["Time",viewApt.time],["Orders",viewApt.totalOrders],["Lines",viewApt.totalLines]].map(([k,v])=>(
                <div key={k} style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6"}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{k}</div><div style={{fontWeight:600,fontSize:13,color:"#111827"}}>{v}</div></div>
              ))}
            </div>
            <div style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6",marginBottom:10}}>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>Storage Location</div>
              <StoreBadge loc={viewApt.storageLocation}/>
            </div>
            {viewApt.offloadingEquipment&&viewApt.offloadingEquipment.length>0 && <div style={{background:"#fffbeb",borderRadius:10,padding:"10px 12px",border:"1px solid #fde68a",marginBottom:10}}><div style={{fontSize:11,color:"#d97706",marginBottom:3}}>Equipment</div><div style={{fontSize:13,fontWeight:600,color:"#92400e"}}>{viewApt.offloadingEquipment.join(", ")}</div></div>}
            {viewApt.additionalNotes && <div style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6",marginBottom:10}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>Notes</div><div style={{fontSize:13,color:"#374151"}}>{viewApt.additionalNotes}</div></div>}
            {viewApt.managerComments && <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 12px",marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:"#ef4444",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Manager Comments</div><div style={{fontSize:13,color:"#991b1b"}}>{viewApt.managerComments}</div></div>}
            <button onClick={()=>setViewId(null)} style={{width:"100%",padding:12,border:"1px solid #e5e7eb",borderRadius:12,fontSize:14,fontWeight:600,color:"#6b7280",background:"transparent",cursor:"pointer",marginTop:4}}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    try {
      var code = document.getElementById("app-code").textContent;
      var result = Babel.transform(code, { presets: ["react"] });
      new Function(result.code)();
    } catch(e) {
      console.error("App error:", e);
      document.getElementById("root").innerHTML =
        "<div style=\"display:flex;align-items:center;justify-content:center;height:100vh;background:#07114C;color:white;font-family:sans-serif;padding:20px;text-align:center;\">" +
        "<div><div style=\"font-size:48px;margin-bottom:16px\">\u26a0\ufe0f</div>" +
        "<div style=\"font-size:18px;font-weight:bold;margin-bottom:8px\">Failed to load</div>" +
        "<div style=\"opacity:0.6;font-size:14px\">" + e.message + "</div></div></div>";
    }
  </script>
</body>
</html>
