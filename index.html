 async function handleFiles(e) {
 const rawFiles = Array.from(e.target.files);
 for(const file of rawFiles){
 if(f.attachments.some(ef=>ef.name===file.name))continue;
 try{
 const filePath=`${Date.now()}_${file.name.replace(/\s+/g,"_")}`;
 console.log("Uploading:",filePath,"size:",file.size,"type:",file.type);
 const {data,error}=await window.supabase.storage.from("attachments").upload(filePath,file,{cacheControl:"3600",upsert:true});
 if(error){console.error("Upload error details:",JSON.stringify(error));throw error;}
 console.log("Upload success:",data);
 const {data:urlData}=window.supabase.storage.from("attachments").getPublicUrl(filePath);
 console.log("Public URL:",urlData.publicUrl);
 const fileObj={name:file.name,size:file.size,type:file.type,url:urlData.publicUrl,path:filePath};
 setF(p=>({...p,attachments:[...p.attachments,fileObj]}));
 }catch(err){
 console.error("Upload failed:",err);
 alert(`Upload failed: ${err.message||JSON.stringify(err)}`);
 }
 }
 e.target.value="";
 }

 const today = todayStr();
 function isSlotPast(slot,dateVal){const d=dateVal!==undefined?dateVal:f.date;if(!d||d>today)return false;if(d<today)return true;const now=new Date(),parts=slot.split(":");const slotMins=parseInt(parts[0],10)*60+parseInt(parts[1],10);return slotMins<=now.getHours()*60+now.getMinutes();}
 function slotCount(slot){if(!f.date)return 0;return(appointments||[]).filter(a=>a.date===f.date&&a.time===slot&&a.status!=="rejected").length;}

 const slotFull = f.time && !f.isEmergency && slotCount(f.time)>=2;

function ConversationThread({ conversation=[], currentAuthor="supplier", authorName="", onSend, appointmentId }){
 const [msg,setMsg]=useState("");
 const [sending,setSending]=useState(false);
 const endRef=useRef(null);
 useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[conversation]);
 async function send(){
 if(!msg.trim()||sending)return;
 setSending(true);
 await onSend(msg.trim());
 setMsg("");
 setSending(false);
 }
 return(
 <div style={{background:"#1e2a4a",borderRadius:14,padding:16,border:"1px solid #3d4f7a",boxShadow:"0 1px 4px rgba(0,0,0,0.3)",marginTop:12}}>
 <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
 <span style={{fontSize:14}}>💬</span>
 <span style={{fontWeight:700,fontSize:14,color:"#ffffff"}}>Conversation</span>
 {conversation.filter(m=>!m.read&&m.author!==currentAuthor).length>0&&(
 <span style={{background:"#ef4444",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99}}>{conversation.filter(m=>!m.read&&m.author!==currentAuthor).length} new</span>
 )}
 </div>
 {conversation.length===0&&(
 <div style={{textAlign:"center",padding:"20px 0",color:"#8899bb",fontSize:13,background:"#162040",borderRadius:10}}>No messages yet. Start the conversation.</div>
 )}
 <div style={{display:"flex",flexDirection:"column",gap:10,maxHeight:300,overflowY:"auto",marginBottom:12}}>
 {conversation.map((m,i)=>{
 const mine=m.author===currentAuthor;
 return(
 <div key={m.id||i} style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start"}}>
 <div style={{maxWidth:"80%",background:mine?"#C8962A":"#2d3f6a",borderRadius:mine?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px"}}>
 <div style={{fontSize:11,fontWeight:700,color:mine?"#07114C":"#aabbdd",marginBottom:4}}>
 {m.author==="admin"?"🛡️ "+m.authorName:"📦 "+m.authorName}
 </div>
 <div style={{fontSize:13,color:mine?"#07114C":"#e8edf8",lineHeight:1.5,whiteSpace:"pre-wrap",fontWeight:500}}>{m.message}</div>
 <div style={{fontSize:10,color:mine?"rgba(7,17,76,0.6)":"#6677aa",marginTop:4,textAlign:"right"}}>{fmtTs(m.timestamp)}</div>
 </div>
 </div>
 );
 })}
 <div ref={endRef}/>
 </div>
 <div style={{display:"flex",gap:8}}>
 <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Type a message... (Enter to send)" style={{flex:1,border:"1px solid #3d4f7a",borderRadius:10,padding:"10px 12px",fontSize:13,background:"#162040",color:"#ffffff",outline:"none",caretColor:"#ffffff"}}/>
 <button onClick={send} disabled={!msg.trim()||sending} style={{padding:"10px 16px",background:sending?"#4a5568":"#C8962A",color:sending?"#fff":"#07114C",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:msg.trim()&&!sending?"pointer":"not-allowed"}}>{sending?"...":"Send"}</button>
 </div>
 </div>
 );
}

 const [searched,setSearched]=useState(false);
 const [pinInputs,setPinInputs]=useState({});
 const [pinErrors,setPinErrors]=useState({});
 const [unlocked,setUnlocked]=useState({});

 // Live results — always derived from latest appointments prop
 const results=useMemo(()=>{
  if(!searched||!searchQuery.trim())return [];
  const q=searchQuery.trim().toLowerCase();
  return appointments.filter(a=>matchesAppt(a,q)).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
 },[appointments,searched,searchQuery]);

 function doSearch(){
 if(!searchQuery.trim())return;
 setSearched(true);
 setPinInputs({});setPinErrors({});setUnlocked({});
 }

 function handlePinInput(id,val){
 if(val.length<=4&&/^\d*$/.test(val)){
 setPinInputs(p=>({...p,[id]:val}));
 setPinErrors(p=>({...p,[id]:""}));
 }
 }

 function verifyPin(a){
 const entered=(pinInputs[a.id]||"").trim();
 if(entered===a.pin){
 setUnlocked(p=>({...p,[a.id]:true}));
 setPinErrors(p=>({...p,[a.id]:""}));
 } else {
 setPinErrors(p=>({...p,[a.id]:"Incorrect PIN. Please check and try again."}));
 }
 }

 return (
 <div style={{minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",fontFamily:"system-ui,sans-serif"}}>
 <TopBar onBack={onBack}/>
 <div style={{maxWidth:640,width:"100%",margin:"0 auto",padding:isMobile?"20px 16px":"28px 20px"}}>
 <h1 style={{color:"#fff",fontWeight:800,fontSize:isMobile?20:24,marginBottom:4}}>Track Your Appointment</h1>
 <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:20}}>Search by Appointment ID, email, supplier name, or PO number — then enter your 4-digit PIN to view details.</p>

 <div style={{background:"#fff",borderRadius:20,padding:isMobile?16:20,marginBottom:20}}>
 <div style={{display:"flex",flexDirection:isMobile?"column":"row",gap:10}}>
 <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="Search by any field — ID, name, email, PO, date, status…" style={{flex:1,border:"1px solid #e5e7eb",borderRadius:12,padding:"11px 14px",fontSize:14,background:"#f9fafb",outline:"none"}}/>
 <button onClick={doSearch} style={{padding:"11px 20px",background:P,color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>Search</button>
 </div>
 </div>

 {searched&&results.length===0&&(
 <div style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:isMobile?40:60,textAlign:"center"}}>
 <div style={{fontSize:36,marginBottom:10}}>🔍</div>
 <h3 style={{color:"#fff",fontWeight:600,margin:"0 0 6px"}}>No appointments found</h3>
 <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,margin:0}}>Please check your search term and try again.</p>
 </div>
 )}

 {results.map(a=>{
 const isUnlocked=unlocked[a.id];
 const statusColor=a.status==="approved"?"#065f46":a.status==="rejected"?"#991b1b":a.status==="revision_required"?"#9a3412":"#92400e";
 const statusBg=a.status==="approved"?"#d1fae5":a.status==="rejected"?"#fee2e2":a.status==="revision_required"?"#ffedd5":"#fef3c7";
 const statusBorder=a.status==="approved"?"#6ee7b7":a.status==="rejected"?"#fca5a5":a.status==="revision_required"?"#fed7aa":"#fcd34d";
 return (
 <div key={a.id} style={{background:"#fff",borderRadius:20,marginBottom:16,overflow:"hidden",border:"1px solid #f3f4f6"}}>
 {isUnlocked ? (
 <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",background:statusBg,borderBottom:`1px solid ${statusBorder}`}}>
 <div style={{display:"flex",alignItems:"center",gap:10}}>
 <span style={{fontSize:20}}>{a.status==="approved"?"✅":a.status==="rejected"?"❌":a.status==="revision_required"?"↩️":a.priority==="emergency"?"🚨":"⏳"}</span>
 <div style={{fontWeight:700,fontSize:14,color:statusColor}}>{a.status==="approved"?"Approved":a.status==="rejected"?"Rejected":a.status==="revision_required"?"Revision Required":a.priority==="emergency"?"🚨 Emergency — Pending Review":"Pending Review"}</div>
 </div>
 <span style={{fontFamily:"monospace",fontSize:12,fontWeight:800,color:P}}>{a.id}</span>
 </div>
 ) : (
 <div style={{padding:"14px 18px",background:"#f9fafb",borderBottom:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
 <span style={{color:"#6b7280",fontSize:12,fontWeight:600}}>🔒 Locked</span>
 <span style={{fontFamily:"monospace",fontSize:12,fontWeight:800,color:P}}>{a.id}</span>
 </div>
 )}

 {!isUnlocked ? (
 <div style={{padding:24}}>
 <div style={{textAlign:"center",marginBottom:18}}>
 <div style={{fontSize:36,marginBottom:10}}>🔐</div>
 <p style={{fontSize:13,color:"#6b7280",margin:0}}>Enter your 4-digit PIN to view appointment details</p>
 </div>
 <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,margin:"0 auto"}}>
 <div style={{display:"flex",gap:10,width:"100%",maxWidth:220}}>
 <input
 type="text"
 inputMode="numeric"
 maxLength={4}
 placeholder="• • • •"
 value={pinInputs[a.id]||""}
 onChange={e=>handlePinInput(a.id,e.target.value)}
 onKeyDown={e=>e.key==="Enter"&&verifyPin(a)}
 style={{flex:1,border:`2px solid ${pinErrors[a.id]?"#f87171":"#d1d5db"}`,borderRadius:12,padding:"11px",fontSize:20,textAlign:"center",outline:"none",letterSpacing:8,fontWeight:800,color:P,background:"#f9fafb",width:"100%"}}
 />
 <button onClick={()=>verifyPin(a)} style={{padding:"11px 16px",background:P,color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>
 Unlock
 </button>
 </div>
 </div>
 {pinErrors[a.id]&&<p style={{fontSize:12,color:"#dc2626",textAlign:"center",margin:"10px 0 0"}}>⛔ {pinErrors[a.id]}</p>}
 </div>
 ) : (
 <div style={{padding:18}}>
 <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"1fr 1fr",gap:10,marginBottom:12}}>
 {[["Supplier",a.supplierName],["Date",fmtDate(a.date)],["Time",a.time],["Orders / Lines",`${a.totalOrders} / ${a.totalLines}`]].map(([k,v])=>(
 <div key={k} style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6"}}>
 <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{k}</div>
 <div style={{fontWeight:600,fontSize:13,color:"#111827"}}>{v}</div>
 </div>
 ))}
 </div>
 {a.storageLocation&&a.storageLocation.length>0&&<div style={{marginBottom:10}}><StoreBadge loc={a.storageLocation}/></div>}
 {a.deliveryTo&&(
 <div style={{background:"#eef2ff",border:"1px solid #c7d2fe",borderRadius:10,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
 <span style={{fontSize:10,fontWeight:700,color:"#4f46e5",textTransform:"uppercase",letterSpacing:1}}>Delivery to</span>
 <span style={{fontSize:13,fontWeight:700,color:"#312e81",fontFamily:"monospace"}}>{a.deliveryTo}</span>
 <span style={{fontSize:12,color:"#6366f1"}}>{(SBUS.find(s=>s.code===a.deliveryTo)||{}).name||""}</span>
 </div>
 )}
 {a.attachments&&a.attachments.length>0&&(
 <div style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6",marginBottom:10}}>
 <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>Attachments</div>
 <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
 {a.attachments.map(file=>(
 <span key={file.name} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#e0e7ff",color:"#3730a3",fontSize:11,fontWeight:600,padding:"3px 9px",borderRadius:8,border:"1px solid #c7d2fe"}}>
 📎 {file.name}
 </span>
 ))}
 </div>
 </div>
 )}
 {a.status==="rejected"&&a.managerComments&&(
 <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
 <div style={{fontSize:10,fontWeight:700,color:"#ef4444",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Rejection Reason</div>
 <p style={{fontSize:13,color:"#991b1b",margin:0}}>{a.managerComments}</p>
 </div>
 )}
 {a.status==="revision_required"&&a.revisionComments&&(
 <div style={{background:"#ffedd5",border:"1px solid #fed7aa",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
 <div style={{fontSize:10,fontWeight:700,color:"#ea580c",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>⚠️ Action Required - Revision Needed</div>
 <div style={{background:"#fff",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid #fdba74"}}>
 <div style={{fontSize:10,color:"#9a3412",marginBottom:3,fontWeight:600}}>Admin Comments:</div>
 <p style={{fontSize:13,color:"#7c2d12",margin:0,fontWeight:500}}>{a.revisionComments}</p>
 </div>
 {a.revisionHistory&&a.revisionHistory.length>1&&(
 <details style={{marginTop:8}}>
 <summary style={{fontSize:11,color:"#9a3412",cursor:"pointer",fontWeight:600}}>View revision history ({a.revisionHistory.length} revisions)</summary>
 <div style={{marginTop:8,paddingLeft:12,borderLeft:"2px solid #fdba74"}}>
 {a.revisionHistory.slice(0,-1).reverse().map((r,i)=>(
 <div key={i} style={{fontSize:11,color:"#7c2d12",marginBottom:6}}>
 <div style={{fontWeight:600}}>{fmtTs(r.timestamp)}</div>
 <div>{r.comments}</div>
 </div>
 ))}
 </div>
 </details>
 )}
 <button onClick={()=>window.editAppointment=a.id} style={{width:"100%",padding:"12px",background:"#ea580c",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:10}}>
 📝 Edit & Resubmit
 </button>
 </div>
 )}
 <ConversationThread
 conversation={a.conversation||[]}
 currentAuthor="supplier"
 authorName={a.supplierName||"Supplier"}
 appointmentId={a.id}
 onSend={async(msg)=>{
 if(onSendMessage) await onSendMessage(a.id, msg, a.supplierName||"Supplier");
 }}
 />
 </div>
 )}
 </div>
 );
 })}
 </div>
 </div>
 );
}


// SupplierApp — only handles supplier-facing pages
function buildEmailBody(type,appt,extra={}){
 const sbuLabel=sbuName(appt.deliveryTo)||appt.deliveryTo||"—";
 const poList=(appt.poNumbers||[]).join(", ")||"—";
 const storage=Array.isArray(appt.storageLocation)?appt.storageLocation.join(", "):appt.storageLocation||"—";
 const equipment=appt.offloadingEquipment&&appt.offloadingEquipment.length>0?appt.offloadingEquipment.join(", "):"Not required";
 if(type==="submission"){return `Dear ${appt.supplierName},\n\nThank you for submitting your delivery appointment request.\n\n${appt.priority==="emergency"?`⚠️ EMERGENCY REQUEST — This has been flagged as urgent.\n\n`:""}\nAppointment Details:\n─────────────────────────────\nReference ID: ${appt.id}\nPriority: ${appt.priority==="emergency"?"🚨 EMERGENCY":"Standard"}\nTracking PIN: ${appt.pin}\nDelivery To: ${sbuLabel}\nDate: ${fmtDate(appt.date)}\nTime: ${appt.time}\nTotal Orders: ${appt.totalOrders||"—"}\nTotal Lines: ${appt.totalLines||"—"}\nPO Numbers: ${poList}\nStorage Location: ${storage}\nEquipment Required: ${equipment}\n${appt.priority==="emergency"?`\nEmergency Justification:\n${appt.emergencyJustification}`:""}\n\nImportant: Please save your Tracking PIN.\n\nStatus: Pending Review\n\nKind regards,\nBE Warehouse Operations\nBapco Energies`;}
 return "";
}

function SupplierApp() {
 const { isMobile } = useWindowSize();
 const [page,setPage]=useState(()=>sessionStorage.getItem("be_sup_page")||"landing");
 const [editingId,setEditingId]=useState(null);

 const [appts,setAppts]=useState(()=>{
  try{const s=localStorage.getItem(LS_APPTS);return s?JSON.parse(s):[];}catch{return [];}
 });
 const [emailLog,setEmailLog]=useState(()=>{
  try{const s=localStorage.getItem(LS_EMAILS);return s?JSON.parse(s):[];}catch{return [];}
 });
 const [transactions,setTransactions]=useState(()=>{
  try{const s=localStorage.getItem(LS_TRANSACTIONS);return s?JSON.parse(s):[];}catch{return [];}
 });
 const [jbCfg]=useState({apiKey:"",binId:""});

 useEffect(()=>{sessionStorage.setItem("be_sup_page",page);},[page]);

 // Load from Supabase on mount
 useEffect(()=>{
  sbGetAll("appointments").then(a=>{if(a){setAppts(a.sort((x,y)=>new Date(y.createdAt)-new Date(x.createdAt)));localStorage.setItem(LS_APPTS,JSON.stringify(a));}});
  sbGetAll("emails").then(e=>{if(e){setEmailLog(e.sort((x,y)=>new Date(y.timestamp)-new Date(x.timestamp)));localStorage.setItem(LS_EMAILS,JSON.stringify(e));}});
  sbGetAll("transactions").then(t=>{if(t){setTransactions(t.sort((x,y)=>new Date(y.timestamp)-new Date(x.timestamp)));localStorage.setItem(LS_TRANSACTIONS,JSON.stringify(t));}});
 },[]);

 // Real-time subscription for appointments (to see approvals + admin messages instantly)
 useEffect(()=>{
  const sub=window.supabase.channel("supplier-appts-"+Date.now()).on("postgres_changes",{event:"*",schema:"public",table:"appointments"},payload=>{
   if(payload.eventType==="DELETE")return;
   const incoming=payload.new?.data;
   if(!incoming)return;
   setAppts(p=>p.map(a=>{
    if(a.id!==incoming.id)return a;
    const localConv=a.conversation||[];
    const remoteConv=incoming.conversation||[];
    const merged=remoteConv.length>=localConv.length?remoteConv:localConv;
    return {...incoming,conversation:merged};
   }));
  }).subscribe();
  return ()=>sub.unsubscribe();
 },[]);

 // Save to localStorage (offline fallback)
 useEffect(()=>{try{localStorage.setItem(LS_APPTS,JSON.stringify(appts));}catch(e){}},[appts]);
 useEffect(()=>{try{localStorage.setItem(LS_EMAILS,JSON.stringify(emailLog));}catch(e){}},[emailLog]);
 useEffect(()=>{try{localStorage.setItem(LS_TRANSACTIONS,JSON.stringify(transactions));}catch(e){}},[transactions]);

 // Listen for edit clicks from tracker
 useEffect(()=>{
  const iv=setInterval(()=>{
   if(window.editAppointment){setEditingId(window.editAppointment);setPage("supplier");window.editAppointment=null;}
  },100);
  return ()=>clearInterval(iv);
 },[]);

 function logEmail(type,appt,extra={}){
  const body=buildEmailBody(type,appt,extra);
  const subjects={submission:appt.priority==="emergency"?`🚨 URGENT – Emergency Delivery Request – ${appt.id}`:`Appointment Request Received – ${appt.id}`};
  const subject=subjects[type]||`Notification – ${appt.id}`;
  const emailDoc={id:Date.now()+Math.random(),timestamp:new Date().toISOString(),type,recipient:appt.supplierEmail,appointmentId:appt.id,subject,body,status:"sent",pin:type==="submission"?appt.pin:null,...extra};
  setEmailLog(p=>[emailDoc,...p]);
  sbUpsert("emails",emailDoc.id,emailDoc);
  // Send to supplier
  if(appt.supplierEmail) sendEmail(appt.supplierEmail,subject,body);
  // Send admin alert for new bookings
  if(type==="submission"){
   const adminSubject=appt.priority==="emergency"?`🚨 URGENT – Emergency Delivery Request – ${appt.id}`:`📦 New Delivery Request – ${appt.id} – ${appt.supplierName}`;
   const adminBody=appt.priority==="emergency"?`URGENT — Emergency delivery request received.\n\nSupplier: ${appt.supplierName}\nEmail: ${appt.supplierEmail}\nID: ${appt.id}\nDate: ${fmtDate(appt.date)}\nTime: ${appt.time}\nDelivery To: ${appt.deliveryTo}\n\nEmergency Justification:\n${appt.emergencyJustification}\n\nPlease review immediately.`:`New delivery request submitted and awaiting review.\n\nSupplier: ${appt.supplierName}\nEmail: ${appt.supplierEmail}\nID: ${appt.id}\nDate: ${fmtDate(appt.date)}\nTime: ${appt.time}\nDelivery To: ${appt.deliveryTo}\nPO Numbers: ${(appt.poNumbers||[]).join(", ")||"—"}\n\nPlease log in to the admin portal to review.`;
   sendEmail(ADMIN_ALERT_EMAIL,adminSubject,adminBody);
  }
  return emailDoc;
 }

 function logTransaction(action,appt,details={}){
  const tx={id:Date.now()+Math.random(),timestamp:new Date().toISOString(),action,actor:details.actor||"Supplier",actorEmail:details.actorEmail||(appt&&appt.supplierEmail)||"—",appointmentId:appt?appt.id:"—",supplierName:appt?appt.supplierName:"—",deliveryTo:appt?appt.deliveryTo:"—",details:details.note||""};
  setTransactions(p=>[tx,...p]);
  sbUpsert("transactions",tx.id,tx);
  return tx;
 }

 async function handleBook(data){
  if(editingId){
   const existing=appts.find(a=>a.id===editingId);
   if(!existing)return {id:editingId,pin:"0000"};
   const updates={supplierName:data.supplierName,supplierEmail:data.supplierEmail,deliveryTo:data.deliveryTo,date:data.date,time:data.time,totalOrders:(data.poNumbers||[]).length||0,totalLines:Number(data.totalLines),poNumbers:data.poNumbers||[],offloadingEquipment:data.needsEquipment?data.offloadingEquipment:[],storageLocation:data.storageLocation,additionalNotes:data.additionalNotes,status:"pending",revisionComments:null,updatedAt:new Date().toISOString()};
   const updated={...existing,...updates};
   setAppts(p=>p.map(a=>a.id===editingId?updated:a));
   await sbUpsert("appointments",existing.id,updated);
   logEmail("submission",updated);
   logTransaction("resubmission",updated,{actor:data.supplierName||"Supplier",actorEmail:data.supplierEmail,note:"Resubmission after revision"});
   setEditingId(null);
   return {id:existing.id,pin:existing.pin};
  }

  // Fetch latest count from Supabase to avoid race condition on ID generation
  const latest = await sbGetAll("appointments");
  const baseAppts = latest || appts;
  const id = nextAptId(baseAppts, data.deliveryTo);
  const pin = genPin();
  const newAppt={id,pin,supplierName:data.supplierName,supplierEmail:data.supplierEmail,deliveryTo:data.deliveryTo,date:data.date,time:data.time,totalOrders:(data.poNumbers||[]).length||0,totalLines:Number(data.totalLines),poNumbers:data.poNumbers||[],offloadingEquipment:data.needsEquipment?data.offloadingEquipment:[],storageLocation:data.storageLocation,additionalNotes:data.additionalNotes,attachments:data.attachments||[],status:"pending",deliveryStatus:"pending",priority:data.isEmergency?"emergency":"standard",emergencyJustification:data.isEmergency?data.emergencyJustification:"",managerComments:null,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  // Update local state using functional update to avoid stale state
  if(latest) setAppts([newAppt,...latest]);
  else setAppts(p=>[newAppt,...p]);
  await sbUpsert("appointments",id,newAppt);
  logEmail("submission",newAppt);
  logTransaction("create",newAppt,{actor:data.supplierName||"Supplier",actorEmail:data.supplierEmail,note:data.isEmergency?"EMERGENCY: "+data.emergencyJustification:"New appointment submitted"});
  return {id,pin};
 }

 const editingAppt=editingId?appts.find(a=>a.id===editingId):null;

 if(page==="landing") return <Landing onSupplier={()=>setPage("supplier")} onAdmin={()=>{window.location.href="admin.html";}} onTracker={()=>setPage("tracker")}/>;
 if(page==="supplier") return <SupplierForm onSubmit={handleBook} onBack={()=>{setEditingId(null);setPage("landing");}} appointments={appts} editingAppointment={editingAppt}/>;
 async function handleSendMessage(aptId, message, authorName){
  const appt=appts.find(a=>a.id===aptId);
  if(!appt)return;
  const newMsg={id:Date.now()+Math.random(),timestamp:new Date().toISOString(),author:"supplier",authorName,message,read:false};
  const updated={...appt,conversation:[...(appt.conversation||[]),newMsg],updatedAt:new Date().toISOString()};
  // Update local state immediately
  setAppts(p=>p.map(a=>a.id===aptId?updated:a));
  // Use upsert (full replace) to avoid race condition
  await sbUpsert("appointments",aptId,updated);
  // Notify admin
  const subject="New Supplier Reply: "+aptId+" — "+appt.supplierName;
  const body=appt.supplierName+" has sent a message on appointment "+aptId+":\n\n\""+message+"\"\n\nPlease log in to the admin portal to review.";
  sendEmail(ADMIN_ALERT_EMAIL, subject, body);
 }

 if(page==="tracker") return <SupplierTracker appointments={appts} onBack={()=>setPage("landing")} onSendMessage={handleSendMessage}/>;
 return <Landing onSupplier={()=>setPage("supplier")} onAdmin={()=>{window.location.href="admin.html";}} onTracker={()=>setPage("tracker")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(SupplierApp));
 </script>

 try {
  var code = document.getElementById("app-code").textContent;
  var result = Babel.transform(code, { presets: ["react"] });
  new Function(result.code)();
 } catch(e) {
  console.error("App error:", e);
  document.getElementById("root").innerHTML =
   "<div style=\"display:flex;align-items:center;justify-content:center;height:100vh;background:#07114C;color:white;font-family:sans-serif;padding:20px;text-align:center;\"><div><div style=\"font-size:48px;margin-bottom:16px\">⚠️</div><div style=\"font-size:18px;font-weight:bold;margin-bottom:8px\">Failed to load</div><div style=\"opacity:0.6;font-size:14px\">" + e.message + "</div></div></div>";
 }
 </script>
