    async function sendEmail(cfg,{to,toName,subject,message}) {
      const r = await fetch("https://api.emailjs.com/api/v1.0/email/send",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({service_id:cfg.serviceId,template_id:cfg.templateId,user_id:cfg.publicKey,

      });
      if (!r.ok) throw new Error("Email send failed");
    }

    const SAMPLE = [];

    function POTagInput({ tags, onChange, hasError }) {
      const [val, setVal] = useState("");
      const ref = useRef();
      function clean(v) { return v.trim().toUpperCase().replace(/,/g,""); }
      function addTag(raw) { const v=clean(raw); if (!v||tags.some(t=>t.toUpperCase()===v)){setVal("");return;} onChange([...tags,v]); setVal(""); }
      function removeTag(t) { onChange(tags.filter(x=>x!==t)); }
      function onKey(e) {
        if (["Enter",",","Tab"].includes(e.key)) { e.preventDefault(); addTag(val); }
        else if (e.key==="Backspace"&&val===""&&tags.length>0) removeTag(tags[tags.length-1]);
      }
      function onPaste(e) {
        e.preventDefault();
        const parts=e.clipboardData.getData("text").split(/[\n,\s]+/).map(clean).filter(Boolean);
        const existing=new Set(tags.map(t=>t.toUpperCase()));
        const fresh=parts.filter(p=>!existing.has(p));
        if (fresh.length) onChange([...tags,...fresh]);
      }
      const borderCls=hasError?"border-red-400 bg-red-50":"border-gray-200 bg-gray-50";
      return (
        <div onClick={()=>ref.current&&ref.current.focus()} className={"min-h-[52px] border rounded-xl px-3 py-2.5 flex flex-wrap gap-2 items-center cursor-text transition-all focus-within:ring-2 "+borderCls}>
          {tags.map(t=>(
            <span key={t} className="flex items-center gap-1 bg-indigo-50 border border-indigo-200 text-indigo-800 text-xs font-bold px-2.5 py-1.5 rounded-lg whitespace-nowrap">
              <Hash size={10} className="text-indigo-400"/>{t}
              <button type="button" onClick={e=>{e.stopPropagation();removeTag(t);}} className="ml-0.5 text-indigo-300 hover:text-indigo-700"><X size={11}/></button>
            </span>
          ))}
          <input ref={ref} value={val} onChange={e=>setVal(e.target.value)} onKeyDown={onKey} onBlur={()=>addTag(val)} onPaste={onPaste}
            placeholder={tags.length===0?"Type a PO number, then press Enter or comma…":"Add another PO…"}
            className="flex-1 min-w-[180px] bg-transparent text-sm outline-none text-gray-800 placeholder-gray-400 py-0.5"/>
        </div>
      );
    }

    function POTagList({ tags, max, small }) {

      const m=max||3, shown=tags.slice(0,m), rest=tags.length-m;
      const cls=small?"text-xs px-1.5 py-0.5":"text-xs px-2 py-1";
      return (
        <div className="flex flex-wrap gap-1">
          {shown.map(t=>(
            <span key={t} className={"inline-flex items-center gap-0.5 bg-indigo-50 border border-indigo-200 text-indigo-700 font-semibold rounded-md whitespace-nowrap "+cls}>

        </div>
      );
    }

    function CalendarView({ appointments }) {
      const TODAY=new Date(2026,4,16);
      const [view,setView]=useState("monthly"); const [cur,setCur]=useState(new Date(2026,4,16)); const [sel,setSel]=useState(null); const [locFs,setLocFs]=useState([]);
      const LOC_FILTERS=[{key:"yard",label:"Open Yard",dot:"bg-red-400"},{key:"covered",label:"Covered Store",dot:"bg-indigo-400"},{key:"both",label:"Both",dot:"bg-amber-400"}];
      function toggleLocF(key){setLocFs(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);}
      function matchLoc(a){const locs=toLocs(a.storageLocation);if(!locFs.length)return true;return locFs.some(f=>{if(f==="yard")return locs.length===1&&locs.includes("Open Yard");if(f==="covered")return locs.length===1&&locs.includes("Covered store");return locs.includes("Open Yard")&&locs.includes("Covered store");});}
      const allApproved=appointments.filter(a=>a.status==="approved");
      const approved=allApproved.filter(matchLoc);
      function navigate(dir){setCur(c=>{if(view==="daily")return addDays(c,dir);if(view==="weekly")return addDays(c,dir*7);return new Date(c.getFullYear(),c.getMonth()+dir,1);});}
      function forDate(d){return approved.filter(a=>a.date===dsOf(d)).sort((a,b)=>a.time.localeCompare(b.time));}
      function isToday(d){return dsOf(d)===dsOf(TODAY);}
      function weekStart(d){const r=new Date(d);r.setDate(r.getDate()-((r.getDay()+6)%7));return r;}
      function calTitle(){if(view==="monthly")return cur.toLocaleString("default",{month:"long",year:"numeric"});if(view==="daily")return cur.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});const ws=weekStart(cur),we=addDays(ws,6);return ws.getMonth()===we.getMonth()?ws.getDate()+"–"+we.getDate()+" "+ws.toLocaleString("default",{month:"long",year:"numeric"}):ws.getDate()+" "+ws.toLocaleString("default",{month:"short"})+" – "+we.getDate()+" "+we.toLocaleString("default",{month:"short",year:"numeric"});}
      function AptCard({a,onClick}){const s=aptStyle(a);return(<button onClick={onClick} className={"w-full text-left px-2.5 py-2 rounded-xl border text-xs font-medium leading-snug transition-all hover:shadow-md "+s.cls} style={s.sty}><div className="font-bold truncate">{a.time}</div><div className="truncate font-semibold">{a.supplierName}</div><div className="truncate opacity-70">{locsLabel(a.storageLocation)} · {a.totalOrders} orders</div></button>);}
      function renderMonthly(){
        const yr=cur.getFullYear(),mo=cur.getMonth(),daysInMonth=new Date(yr,mo+1,0).getDate(),sc=(new Date(yr,mo,1).getDay()+6)%7,total=Math.ceil((sc+daysInMonth)/7)*7;
        return(<div className="flex-1 bg-white rounded-2xl border border-white/20 shadow-sm overflow-hidden flex flex-col min-h-0"><div className="grid grid-cols-7 border-b border-gray-100" style={{background:P}}>{["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map((d,i)=>(<div key={d} className={"text-center py-3 text-sm font-bold uppercase tracking-widest "+(i>=4?"text-white/25":"text-white/80")}>{d}{i>=4&&<span className="text-xs font-normal opacity-60 ml-1">Off</span>}</div>))}</div><div className="grid grid-cols-7 flex-1 overflow-auto" style={{gridAutoRows:"minmax(110px,1fr)"}}>{Array.from({length:total},(_,i)=>{const dayNum=i-sc+1,valid=dayNum>=1&&dayNum<=daysInMonth,date=valid?new Date(yr,mo,dayNum):null,apts=date?forDate(date):[],isOff=i%7===4||i%7===5,today=date&&isToday(date);return(<div key={i} className={"border-r border-b border-gray-50 p-2 flex flex-col "+(isOff?"bg-gray-100/60":"")}>{valid&&(<div className="flex flex-col flex-1"><div className="flex items-center justify-between mb-2"><div className={"text-sm font-bold w-8 h-8 flex items-center justify-center rounded-full "+(!today?(isOff?"text-gray-300":"text-gray-600"):"")} style={today?{background:A,color:"#fff"}:{}}>{dayNum}</div>{isOff&&<span className="text-xs text-gray-300">Off</span>}</div><div className="space-y-1.5 flex-1">{apts.map(a=><AptCard key={a.id} a={a} onClick={()=>setSel(a)}/>)}</div></div>)}</div>);})}</div></div>);
      }
      function renderWeekly(){
        const ws=weekStart(cur),days=Array.from({length:7},(_,i)=>addDays(ws,i));
        return(<div className="flex-1 bg-white rounded-2xl border border-white/20 shadow-sm overflow-hidden flex flex-col min-h-0"><div className="grid grid-cols-7 border-b border-gray-100" style={{background:P}}>{days.map((d,i)=>{const today=isToday(d),isOff=i===4||i===5;return(<div key={i} className={"text-center py-4 "+(isOff?"opacity-30":"")}><div className="text-xs font-bold uppercase tracking-widest text-white/60 mb-1">{d.toLocaleDateString("en-GB",{weekday:"short"})}</div><div className="text-xl font-extrabold mx-auto w-10 h-10 flex items-center justify-center rounded-full text-white" style={today?{background:A}:{}}>{d.getDate()}</div><div className="text-xs text-white/40 mt-0.5">{isOff?"Off":d.toLocaleDateString("en-GB",{month:"short"})}</div></div>);})}</div><div className="grid grid-cols-7 flex-1 overflow-auto divide-x divide-gray-50">{days.map((d,i)=>{const apts=forDate(d),isOff=i===4||i===5;return(<div key={i} className={"p-3 space-y-2 overflow-y-auto "+(isOff?"bg-gray-100/60":"bg-white")}>{isOff?<div className="flex items-center justify-center h-full"><span className="text-xs text-gray-300">Day Off</span></div>:apts.length===0?<div className="text-xs text-gray-300 text-center pt-6">No deliveries</div>:apts.map(a=><AptCard key={a.id} a={a} onClick={()=>setSel(a)}/>)}</div>);})}</div></div>);
      }
      function renderDaily(){

        return(<div className="flex-1 bg-white rounded-2xl border border-white/20 shadow-sm overflow-hidden flex flex-col min-h-0"><div style={{background:P}} className="px-6 py-5 flex items-center gap-4"><div><div className="text-white/50 text-xs font-semibold uppercase tracking-widest mb-0.5">{cur.toLocaleDateString("en-GB",{weekday:"long"})}</div><div style={{fontFamily:"'Syne',sans-serif"}} className="text-white font-extrabold text-2xl">{cur.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}</div></div><input type="date" value={dsOf(cur)} onChange={e=>e.target.value&&setCur(new Date(e.target.value+"T00:00:00"))} className="ml-4 bg-white/10 border border-white/20 rounded-xl px-3 py-2 text-white text-sm focus:outline-none cursor-pointer hover:bg-white/20 transition-colors" style={{colorScheme:"dark"}}/><div className="ml-auto"><span className="bg-white/20 text-white text-sm font-bold px-4 py-1.5 rounded-full">{apts.length} appointment{apts.length!==1?"s":""}</span></div></div><div className="flex-1 overflow-y-auto p-6">{apts.length===0?<div className="flex flex-col items-center justify-center h-full text-gray-300 gap-3"><Calendar size={48}/><p className="text-sm">No approved deliveries on this day.</p></div>:<div className="space-y-4 max-w-xl mx-auto">{apts.map(a=>{const s=aptStyle(a);return(<button key={a.id} onClick={()=>setSel(a)} className={"w-full text-left p-5 rounded-2xl border-2 transition-all hover:shadow-lg "+s.cls} style={s.sty}><div className="flex items-center justify-between mb-3"><span style={{fontFamily:"'Syne',sans-serif"}} className="text-2xl font-extrabold">{a.time}</span><StoreBadge loc={a.storageLocation}/></div><div className="font-bold text-base mb-1">{a.supplierName}</div><div className="text-sm opacity-60 mb-3">{a.supplierEmail}</div>{(a.poNumbers||[]).length>0&&<div className="mb-2"><POTagList tags={a.poNumbers} max={4} small={true}/></div>}<div className="flex gap-4 text-xs font-semibold opacity-60"><span>{a.totalOrders} orders</span><span>{a.totalLines} lines</span>{a.offloadingEquipment.length>0&&<span>{a.offloadingEquipment.join(", ")}</span>}</div></button>);})}</div>}</div></div>);
      }
      return(
        <div className="p-6 flex flex-col" style={{height:"100vh"}}>
          <div className="flex items-center justify-between mb-5 flex-wrap gap-3">

            <div className="flex items-center gap-3 flex-wrap">
              <div className="flex items-center gap-1 bg-white/10 border border-white/15 rounded-2xl p-1.5">
                {LOC_FILTERS.map(({key,label,dot})=>{const on=locFs.includes(key);const count=allApproved.filter(a=>{const locs=toLocs(a.storageLocation);if(key==="yard")return locs.length===1&&locs.includes("Open Yard");if(key==="covered")return locs.length===1&&locs.includes("Covered store");return locs.includes("Open Yard")&&locs.includes("Covered store");}).length;return(<button key={key} onClick={()=>toggleLocF(key)} className="flex items-center gap-2 px-3.5 py-2 text-xs font-semibold rounded-xl transition-all" style={on?{background:A,color:"#fff"}:{color:"rgba(255,255,255,0.5)"}}><div className={"w-2.5 h-2.5 rounded-full shrink-0 "+dot+(on?"":" opacity-50")}/>{label}<span className={"text-xs font-bold rounded-full px-1.5 py-0.5 leading-none "+(on?"bg-white/20 text-white":"bg-white/10 text-white/40")}>{count}</span></button>);})}

              <div className="flex bg-white/10 border border-white/15 rounded-xl overflow-hidden">{["daily","weekly","monthly"].map(v=><button key={v} onClick={()=>setView(v)} className="px-4 py-2.5 text-sm font-semibold capitalize transition-colors" style={view===v?{background:A,color:"#fff"}:{color:"rgba(255,255,255,0.6)"}}>{v}</button>)}</div>
              <button onClick={()=>setCur(new Date(TODAY))} style={{borderColor:"rgba(255,255,255,0.2)",color:"#fff"}} className="px-4 py-2.5 border rounded-xl text-sm font-semibold hover:bg-white/10 bg-white/5">Today</button>
              <div className="flex items-center gap-1 bg-white/10 border border-white/15 rounded-xl overflow-hidden"><button onClick={()=>navigate(-1)} className="p-2.5 hover:bg-white/10"><ChevronLeft size={18} className="text-white/70"/></button><div className="w-px h-5 bg-white/20"/><button onClick={()=>navigate(1)} className="p-2.5 hover:bg-white/10"><ChevronRight size={18} className="text-white/70"/></button></div>
            </div>
          </div>
          {view==="monthly"&&renderMonthly()}
          {view==="weekly"&&renderWeekly()}
          {view==="daily"&&renderDaily()}
          {sel&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-7 max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-start mb-5"><div><StoreBadge loc={sel.storageLocation}/><h3 style={{fontFamily:"'Syne',sans-serif",color:P}} className="font-extrabold text-xl mt-2">{sel.supplierName}</h3><p className="text-sm text-gray-500">{sel.supplierEmail}</p></div><button onClick={()=>setSel(null)} className="text-gray-400 hover:text-gray-700"><X size={20}/></button></div>
                <div className="grid grid-cols-2 gap-3 mb-3">{[["Date",fmtDate(sel.date)],["Time",sel.time],["Total Orders",sel.totalOrders],["Total Lines",sel.totalLines]].map(([k,v])=>(<div key={k} className={"bg-gray-50 rounded-xl p-3 border border-gray-100 "+(k==="Date"?"col-span-2":"")}><div className="text-xs text-gray-400 mb-1">{k}</div><div className="font-semibold text-gray-900">{v}</div></div>))}</div>
                {(sel.poNumbers||[]).length>0&&<div className="bg-indigo-50 rounded-xl p-3 border border-indigo-100 mb-3"><div className="text-xs text-indigo-600 font-semibold mb-2 flex items-center gap-1"><Hash size={11}/>PO Numbers ({sel.poNumbers.length})</div><POTagList tags={sel.poNumbers} max={sel.poNumbers.length}/></div>}
                {sel.offloadingEquipment.length>0&&<div className="bg-amber-50 rounded-xl p-3 border border-amber-100 mb-3"><div className="text-xs text-amber-600 mb-1">Off-loading Equipment</div><div className="text-sm font-semibold text-amber-900">{sel.offloadingEquipment.join(", ")}</div></div>}
                {sel.attachmentName&&<div className="flex items-center gap-2.5 bg-amber-50 border border-amber-200 rounded-xl p-3 mb-3"><Paperclip size={14} className="text-amber-600 shrink-0"/><div><div className="text-xs text-amber-600">Delivery Note</div><div className="text-sm font-semibold text-amber-900">{sel.attachmentName}</div></div></div>}
                {sel.additionalNotes&&<div className="bg-gray-50 rounded-xl p-3 border border-gray-100 mb-3"><div className="text-xs text-gray-400 mb-1">Notes</div><div className="text-sm text-gray-700">{sel.additionalNotes}</div></div>}
                <button onClick={()=>setSel(null)} className="mt-2 w-full py-3 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50">Close</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function EmailLog({ emailLog }) {
      return(
        <div className="p-8">
          <div className="mb-8"><h1 style={{fontFamily:"'Syne',sans-serif",color:"#fff"}} className="text-3xl font-extrabold">Email Log</h1><p style={{color:"rgba(255,255,255,0.5)"}} className="text-sm mt-1">All notification emails generated this session</p></div>
          {emailLog.length===0
            ?<div className="bg-white/10 border border-white/15 rounded-2xl p-20 text-center"><Mail className="text-white/20 mx-auto mb-4" size={48}/><p style={{color:"rgba(255,255,255,0.4)"}} className="text-sm">No emails yet. Approve or reject appointments to see logs here.</p></div>
            :<div className="space-y-4">{emailLog.map(log=>(
              <div key={log.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                <div className="flex items-start justify-between mb-4">
                  <div className="flex items-center gap-3"><div className={"w-9 h-9 rounded-xl flex items-center justify-center "+(log.status==="sent"?"bg-emerald-100":"bg-red-100")}>{log.status==="sent"?<CheckCircle2 className="text-emerald-600" size={16}/>:<XCircle className="text-red-600" size={16}/>}</div><div><div className="font-semibold text-gray-900 text-sm">{log.subject}</div><div className="text-xs text-gray-400">To: {log.to}</div></div></div>
                  <div className="flex items-center gap-3 shrink-0"><span className={"text-xs font-semibold px-2.5 py-1 rounded-full "+(log.status==="sent"?"bg-emerald-100 text-emerald-700":"bg-red-100 text-red-700")}>{log.status==="sent"?"Sent":"Failed"}</span><span className="text-xs text-gray-400">{new Date(log.sentAt).toLocaleString()}</span></div>
                </div>
                <pre className="text-xs text-gray-500 bg-gray-50 p-4 rounded-xl whitespace-pre-wrap font-mono leading-relaxed border border-gray-100">{log.body}</pre>
              </div>
            ))}</div>
          }
        </div>
      );
    }

    function SettingsPanel({ config, onChange }) {
      function set(k){return e=>onChange(c=>({...c,[k]:e.target.value}));}
      const inp="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 bg-gray-50";
      const ok=config.serviceId&&config.templateId&&config.publicKey;
      return(
        <div className="p-8">
          <div className="mb-8"><h1 style={{fontFamily:"'Syne',sans-serif",color:"#fff"}} className="text-3xl font-extrabold">Settings</h1><p style={{color:"rgba(255,255,255,0.5)"}} className="text-sm mt-1">Configure EmailJS for real email notifications</p></div>
          <div className="max-w-xl space-y-6">
            <div className="bg-white/10 border border-white/15 rounded-2xl p-6"><div className="font-semibold text-white mb-3 flex items-center gap-2"><Mail size={16}/> EmailJS Setup (free)</div><ol className="text-xs text-white/60 space-y-1.5 list-decimal ml-5 leading-relaxed"><li>Create a free account at <strong className="text-white/80">emailjs.com</strong></li><li>Add an Email Service → copy <strong className="text-white/80">Service ID</strong></li><li>Create a Template with variables → copy <strong className="text-white/80">Template ID</strong></li><li>Account → API Keys → copy <strong className="text-white/80">Public Key</strong></li></ol></div>
            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 space-y-4">
              {[["Public Key","publicKey","your_public_key","password"],["Service ID","serviceId","service_xxxxxxx","text"],["Template ID","templateId","template_xxxxxxx","text"],["Admin Reply-To Email","adminEmail","warehouse@bapcoenergies.com","email"]].map(([lbl,k,ph,t])=>(<div key={k}><label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">{lbl}</label><input type={t} className={inp} value={config[k]} onChange={set(k)} placeholder={ph}/></div>))}
              <div className={"flex items-start gap-2.5 text-xs p-4 rounded-xl border "+(ok?"bg-emerald-50 border-emerald-200 text-emerald-800":"bg-amber-50 border-amber-200 text-amber-800")}><span className="text-base">{ok?"✅":"⚠️"}</span><div>{ok?<span><strong>EmailJS configured.</strong> Real emails will be sent.</span>:<span><strong>Not configured.</strong> Complete all three required fields.</span>}</div></div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [page,setPage]=useState("landing"); const [view,setView]=useState("dashboard"); const [collapsed,setCollapsed]=useState(true); const [adminEmail,setAdminEmail]=useState(""); const [appts,setAppts]=useState(SAMPLE); const [emailLog,setEmailLog]=useState([]); const [config,setConfig]=useState({serviceId:"",templateId:"",publicKey:"",adminEmail:""}); const [toast,setToast]=useState(null); const [rejectId,setRejectId]=useState(null); const [rejReason,setRejReason]=useState(""); const [viewId,setViewId]=useState(null); const [loading,setLoading]=useState(null);
      function showToast(msg,type){setToast({msg,type:type||"success"});setTimeout(()=>setToast(null),5000);}
      function addLog(to,subject,body,status){setEmailLog(p=>[{id:Date.now(),to,subject,body,status,sentAt:new Date().toISOString()},...p]);}
      async function handleApprove(a){
        setLoading(a.id+"-a");
        const equip=a.offloadingEquipment.length?a.offloadingEquipment.join(", "):"None",locs=toLocs(a.storageLocation).join(" & ")||"—",pos=(a.poNumbers||[]).length?"\n  • PO Numbers:     "+a.poNumbers.join(", "):"";
        const subject="✅ Delivery Appointment Approved – "+a.id;
        const body="Dear "+a.supplierName+",\n\nYour delivery appointment has been APPROVED.\n\nDetails:\n  • Appointment ID: "+a.id+"\n  • Date:           "+fmtDate(a.date)+"\n  • Time:           "+a.time+"\n  • Storage:        "+locs+"\n  • Equipment:      "+equip+"\n  • Total Orders:   "+a.totalOrders+"\n  • Total Lines:    "+a.totalLines+pos+"\n\nPlease arrive 15 minutes early and report to warehouse reception.\n\nBest regards,\nBE Warehouse Team";
        try{if(config.serviceId&&config.templateId&&config.publicKey)await sendEmail(config,{to:a.supplierEmail,toName:a.supplierName,subject,message:body});addLog(a.supplierEmail,subject,body,"sent");setAppts(p=>p.map(x=>x.id===a.id?{...x,status:"approved",updatedAt:new Date().toISOString()}:x));showToast("✅ Approved — "+(config.publicKey?"email sent":"configure EmailJS in Settings for real emails"));}
        catch(e){addLog(a.supplierEmail,subject,body,"failed");setAppts(p=>p.map(x=>x.id===a.id?{...x,status:"approved",updatedAt:new Date().toISOString()}:x));showToast("Approved but email failed: "+e.message,"error");}
        setLoading(null);
      }
      async function handleRejectSubmit(){
        if(!rejReason.trim())return;
        const a=appts.find(x=>x.id===rejectId);setLoading(a.id+"-r");
        const subject="❌ Delivery Appointment Rejected – "+a.id;
        const body="Dear "+a.supplierName+",\n\nYour delivery appointment request has been rejected.\n\nReason:\n"+rejReason+"\n\nFor further clarification contact:\n📧 faisal.janahi@bapcoenergies.com\n\nBest regards,\nBE Warehouse Team";
        try{if(config.serviceId&&config.templateId&&config.publicKey)await sendEmail(config,{to:a.supplierEmail,toName:a.supplierName,subject,message:body});addLog(a.supplierEmail,subject,body,"sent");setAppts(p=>p.map(x=>x.id===a.id?{...x,status:"rejected",managerComments:rejReason,updatedAt:new Date().toISOString()}:x));showToast("❌ Rejected — "+(config.publicKey?"email sent":"configure EmailJS in Settings for real emails"));}
        catch(e){addLog(a.supplierEmail,subject,body,"failed");setAppts(p=>p.map(x=>x.id===a.id?{...x,status:"rejected",managerComments:rejReason,updatedAt:new Date().toISOString()}:x));showToast("Rejected but email failed: "+e.message,"error");}
        setRejectId(null);setRejReason("");setLoading(null);
      }
      function handleBook(data){setAppts(p=>[{id:"APT-"+String(p.length+1).padStart(3,"0"),supplierName:data.supplierName,supplierEmail:data.supplierEmail,date:data.date,time:data.time,totalOrders:Number(data.totalOrders),totalLines:Number(data.totalLines),poNumbers:data.poNumbers||[],offloadingEquipment:data.needsEquipment?data.offloadingEquipment:[],storageLocation:data.storageLocation,additionalNotes:data.additionalNotes,attachmentName:data.attachmentName||null,status:"pending",managerComments:null,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},...p]);}
      if(page==="landing")return <Landing onSupplier={()=>setPage("supplier")} onAdmin={()=>setPage("admin-login")} onTracker={()=>setPage("tracker")}/>;
      if(page==="supplier")return <SupplierForm onSubmit={d=>{handleBook(d);}} onBack={()=>setPage("landing")} appointments={appts}/>;
      if(page==="tracker")return <SupplierTracker appointments={appts} onBack={()=>setPage("landing")}/>;
      if(page==="admin-login")return <AdminLogin onLogin={e=>{setAdminEmail(e);setPage("admin");setView("dashboard");}} onBack={()=>setPage("landing")}/>;
      const pending=appts.filter(a=>a.status==="pending"),viewApt=appts.find(a=>a.id===viewId);
      const nav=[{id:"dashboard",Icon:LayoutDashboard,label:"Dashboard"},{id:"admin",Icon:ClipboardList,label:"Admin Panel",badge:pending.length},{id:"calendar",Icon:Calendar,label:"Warehouse Calendar"},{id:"emails",Icon:Mail,label:"Email Log",badge:emailLog.length},{id:"settings",Icon:Settings,label:"Settings"}];
      return(
        <div style={{fontFamily:"'DM Sans',system-ui,sans-serif"}} className="min-h-screen flex flex-col">
          <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap');`}</style>
          <header style={{background:BG}} className="h-16 flex items-center justify-between px-6 shrink-0 z-10 border-b border-white/10">
            <div className="flex items-center gap-4"><Logo/><div className="h-5 w-px bg-white/20"/><span style={{fontFamily:"'Syne',sans-serif"}} className="text-white font-extrabold text-sm tracking-wide">BE – Warehouse Appointments</span></div>
            <div className="flex items-center gap-4"><span className="text-white/50 text-xs">{adminEmail}</span><button onClick={()=>{setPage("landing");setView("dashboard");}} className="flex items-center gap-1.5 text-white/60 hover:text-white text-xs font-medium transition-colors"><LogOut size={14}/> Logout</button></div>
          </header>
          <div className="flex flex-1 overflow-hidden">
            <aside style={{background:"rgba(7,17,76,0.95)",minHeight:"calc(100vh - 64px)"}} className={"shrink-0 transition-all duration-300 flex flex-col border-r border-white/10 "+(collapsed?"w-16":"w-60")}>
              <div className={"flex p-3 border-b border-white/5 "+(collapsed?"justify-center":"justify-end")}><button onClick={()=>setCollapsed(c=>!c)} className="p-1.5 rounded-lg text-white/30 hover:text-white hover:bg-white/10 transition-colors">{collapsed?<ChevronRight size={15}/>:<ChevronLeft size={15}/>}</button></div>
              <nav className="flex-1 p-3 space-y-1">{nav.map(item=><NavItem key={item.id} {...item} active={view===item.id} collapsed={collapsed} onClick={()=>setView(item.id)}/>)}</nav>
              {!collapsed&&<div className="p-3 border-t border-white/5"><div className={"flex items-center gap-2 text-xs px-3 py-2 rounded-xl "+(config.publicKey?"bg-emerald-900/30 text-emerald-400":"bg-white/5 text-white/30")}><div className={"w-1.5 h-1.5 rounded-full shrink-0 "+(config.publicKey?"bg-emerald-400":"bg-white/20")}/>{config.publicKey?"EmailJS Connected":"EmailJS Not Configured"}</div></div>}
            </aside>
            <main className="flex-1 overflow-auto" style={{background:BG}}>
              {view==="dashboard"&&<Dashboard appointments={appts} setView={setView}/>}
              {view==="admin"&&<AdminPanel appointments={appts} onApprove={handleApprove} onReject={id=>{setRejectId(id);setRejReason("");}} onView={setViewId} loading={loading}/>}
              {view==="calendar"&&<CalendarView appointments={appts}/>}
              {view==="emails"&&<EmailLog emailLog={emailLog}/>}
              {view==="settings"&&<SettingsPanel config={config} onChange={setConfig}/>}
            </main>
          </div>
          {toast&&(<div style={{background:toast.type==="error"?"#dc2626":P}} className="fixed top-5 right-5 z-50 flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-xl text-white text-sm max-w-sm"><span className="flex-1 leading-snug">{toast.msg}</span><button onClick={()=>setToast(null)}><X size={14}/></button></div>)}
          {rejectId&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-40 p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-7">
                <div className="flex items-center gap-4 mb-6"><div className="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center shrink-0"><XCircle className="text-red-600" size={24}/></div><div><h3 style={{fontFamily:"'Syne',sans-serif",color:P}} className="font-extrabold text-xl">Reject Appointment</h3><p className="text-sm text-gray-500">Supplier will be notified with this reason</p></div></div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Manager Comments <span className="text-red-500">*</span></label>
                <textarea value={rejReason} onChange={e=>setRejReason(e.target.value)} placeholder="e.g. The requested time slot is fully booked." className="w-full border border-gray-200 rounded-xl p-4 text-sm resize-none h-32 focus:outline-none focus:ring-2 bg-gray-50 leading-relaxed" autoFocus/>
                <div className="flex gap-3 mt-5">
                  <button onClick={()=>setRejectId(null)} className="flex-1 py-3 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50">Cancel</button>
                  <button onClick={handleRejectSubmit} disabled={!rejReason.trim()||!!loading} className="flex-1 py-3 bg-red-600 text-white rounded-xl text-sm font-semibold hover:bg-red-700 disabled:opacity-40 flex items-center justify-center gap-2"><Send size={14}/>{loading?"Sending…":"Reject & Notify"}</button>
                </div>
              </div>
            </div>
          )}
          {viewApt&&(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-40 p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-7 max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-start mb-6"><div><div className="text-xs font-mono text-gray-400 mb-1">{viewApt.id}</div><h3 style={{fontFamily:"'Syne',sans-serif",color:P}} className="font-extrabold text-xl">{viewApt.supplierName}</h3><p className="text-sm text-gray-500">{viewApt.supplierEmail}</p></div><div className="flex items-center gap-3"><StatusBadge status={viewApt.status}/><button onClick={()=>setViewId(null)} className="text-gray-400 hover:text-gray-700"><X size={20}/></button></div></div>
                <div className="grid grid-cols-2 gap-3 mb-3">{[["Date",fmtDate(viewApt.date)],["Time",viewApt.time],["Total Orders",viewApt.totalOrders],["Total Lines",viewApt.totalLines]].map(([k,v])=>(<div key={k} className="bg-gray-50 rounded-xl p-3 border border-gray-100"><div className="text-xs text-gray-400 mb-1">{k}</div><div className="font-semibold text-gray-900 text-sm">{v}</div></div>))}<div className="col-span-2 bg-gray-50 rounded-xl p-3 border border-gray-100"><div className="text-xs text-gray-400 mb-1.5">Storage Location</div><StoreBadge loc={viewApt.storageLocation}/></div></div>
                {(viewApt.poNumbers||[]).length>0&&<div className="bg-indigo-50 rounded-xl p-3 border border-indigo-100 mb-3"><div className="text-xs text-indigo-600 font-semibold mb-2 flex items-center gap-1"><Hash size={11}/>PO Numbers ({viewApt.poNumbers.length})</div><POTagList tags={viewApt.poNumbers} max={viewApt.poNumbers.length}/></div>}
                {viewApt.offloadingEquipment.length>0&&<div className="bg-amber-50 rounded-xl p-3 border border-amber-100 mb-3"><div className="text-xs text-amber-600 mb-1">Off-loading Equipment</div><div className="text-sm font-semibold text-amber-900">{viewApt.offloadingEquipment.join(", ")}</div></div>}
                {viewApt.attachmentName&&<div className="flex items-center gap-2.5 bg-amber-50 border border-amber-200 rounded-xl p-3 mb-3"><Paperclip size={14} className="text-amber-600 shrink-0"/><div><div className="text-xs text-amber-600 font-semibold">Delivery Note</div><div className="text-sm font-semibold text-amber-900">{viewApt.attachmentName}</div></div></div>}
                {viewApt.additionalNotes&&<div className="bg-gray-50 rounded-xl p-3 border border-gray-100 mb-3"><div className="text-xs text-gray-400 mb-1">Notes</div><div className="text-sm text-gray-700">{viewApt.additionalNotes}</div></div>}
                {viewApt.managerComments&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3"><div className="text-xs text-red-500 font-semibold mb-1 uppercase tracking-wide">Manager Comments</div><div className="text-sm text-red-800">{viewApt.managerComments}</div></div>}
                <button onClick={()=>setViewId(null)} className="mt-2 w-full py-3 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50">Close</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Load libraries then transform and run the app -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    try {
      var code = document.getElementById('app').textContent;
      var result = Babel.transform(code, { presets: ['react'] });
      new Function(result.code)();
    } catch(e) {
      console.error('App failed:', e);
      document.getElementById('root').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#07114C;color:white;font-family:sans-serif;padding:20px;text-align:center;">' +
        '<div><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;font-weight:bold;margin-bottom:8px">Failed to load</div>' +
        '<div style="opacity:0.6;font-size:14px">Please refresh the page</div></div></div>';
    }
  </script>
</body>
</html>
