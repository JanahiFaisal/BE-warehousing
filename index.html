 function toggleEq(eq){setF(p=>({...p,offloadingEquipment:p.offloadingEquipment.includes(eq)?p.offloadingEquipment.filter(x=>x!==eq):[...p.offloadingEquipment,eq]}));}

 function handleFiles(e) {
 const files = Array.from(e.target.files).map(file=>({name:file.name,size:file.size,type:file.type}));
 setF(p=>({...p,attachments:[...p.attachments,...files.filter(nf=>!p.attachments.some(ef=>ef.name===nf.name))]}));
 e.target.value="";
 }
 function removeAttachment(name){setF(p=>({...p,attachments:p.attachments.filter(f=>f.name!==name)}));}

 const today = todayStr();
 function isSlotPast(slot,dateVal){const d=dateVal!==undefined?dateVal:f.date;if(!d||d>today)return false;if(d<today)return true;const now=new Date(),parts=slot.split(":");const slotMins=parseInt(parts[0],10)*60+parseInt(parts[1],10);return slotMins<=now.getHours()*60+now.getMinutes();}
 function slotCount(slot){if(!f.date)return 0;return(appointments||[]).filter(a=>a.date===f.date&&a.time===slot&&a.status!=="rejected").length;}

 const slotFull = f.time && slotCount(f.time)>=2;
 const declared = parseInt(f.totalOrders,10);
 const tagCount = f.poNumbers.length;
 const hasDeclared = f.totalOrders!==""&&!isNaN(declared);
 const mismatch = hasDeclared&&declared!==tagCount;

 ))}

function SupplierTracker({ appointments, onBack }) {
 const { isMobile } = useWindowSize();
 const [query,setQuery]=useState("");
 const [results,setResults]=useState([]);
 const [searched,setSearched]=useState(false);
 const [pinInputs,setPinInputs]=useState({});
 const [pinErrors,setPinErrors]=useState({});
 const [unlocked,setUnlocked]=useState({});

 function doSearch(){
 const q=query.trim().toLowerCase();
 if(!q)return;
 const found=appointments.filter(a=>
 a.id.toLowerCase()===q||
 a.supplierEmail.toLowerCase()===q||
 a.supplierName.toLowerCase().includes(q)||
 (a.poNumbers||[]).some(p=>p.toLowerCase().includes(q))
 ).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
 setResults(found);
 setSearched(true);
 setPinInputs({});setPinErrors({});setUnlocked({});
 }

 function handlePinInput(id,val){
 if(val.length<=4&&/^\d*$/.test(val)){
 setPinInputs(p=>({...p,[id]:val}));
 setPinErrors(p=>({...p,[id]:""}));
 }
 }

 function verifyPin(a){
 const entered=(pinInputs[a.id]||"").trim();
 if(entered===a.pin){
 setUnlocked(p=>({...p,[a.id]:true}));
 setPinErrors(p=>({...p,[a.id]:""}));
 } else {
 setPinErrors(p=>({...p,[a.id]:"Incorrect PIN. Please check and try again."}));
 }
 }

 return (
 <div style={{minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",fontFamily:"system-ui,sans-serif"}}>
 <TopBar onBack={onBack}/>
 <div style={{maxWidth:640,width:"100%",margin:"0 auto",padding:isMobile?"20px 16px":"28px 20px"}}>
 <h1 style={{color:"#fff",fontWeight:800,fontSize:isMobile?20:24,marginBottom:4}}>Track Your Appointment</h1>
 <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:20}}>Search by Appointment ID, email, supplier name, or PO number — then enter your 4-digit PIN to view details.</p>

 <div style={{background:"#fff",borderRadius:20,padding:isMobile?16:20,marginBottom:20}}>
 <div style={{display:"flex",flexDirection:isMobile?"column":"row",gap:10}}>
 <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="e.g. BE-0001 or dispatch@company.com" style={{flex:1,border:"1px solid #e5e7eb",borderRadius:12,padding:"11px 14px",fontSize:14,background:"#f9fafb",outline:"none"}}/>
 <button onClick={doSearch} style={{padding:"11px 20px",background:P,color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>Search</button>
 </div>
 </div>

 {searched&&results.length===0&&(
 <div style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:isMobile?40:60,textAlign:"center"}}>
 <div style={{fontSize:36,marginBottom:10}}>🔍</div>
 <h3 style={{color:"#fff",fontWeight:600,margin:"0 0 6px"}}>No appointments found</h3>
 <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,margin:0}}>Please check your search term and try again.</p>
 </div>
 )}

 {results.map(a=>{
 const isUnlocked=unlocked[a.id];
 const statusColor=a.status==="approved"?"#065f46":a.status==="rejected"?"#991b1b":"#92400e";
 const statusBg=a.status==="approved"?"#d1fae5":a.status==="rejected"?"#fee2e2":"#fef3c7";
 const statusBorder=a.status==="approved"?"#6ee7b7":a.status==="rejected"?"#fca5a5":"#fcd34d";
 return (
 <div key={a.id} style={{background:"#fff",borderRadius:20,marginBottom:16,overflow:"hidden",border:"1px solid #f3f4f6"}}>
 {isUnlocked ? (
 <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",background:statusBg,borderBottom:`1px solid ${statusBorder}`}}>
 <div style={{display:"flex",alignItems:"center",gap:10}}>
 <span style={{fontSize:20}}>{a.status==="approved"?"✅":a.status==="rejected"?"❌":"⏳"}</span>
 <div style={{fontWeight:700,fontSize:14,color:statusColor}}>{a.status==="approved"?"Approved":a.status==="rejected"?"Rejected":"Pending Review"}</div>
 </div>
 <span style={{fontFamily:"monospace",fontSize:12,fontWeight:800,color:P}}>{a.id}</span>
 </div>
 ) : (
 <div style={{padding:"14px 18px",background:"#f9fafb",borderBottom:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
 <span style={{color:"#6b7280",fontSize:12,fontWeight:600}}>🔒 Locked</span>
 <span style={{fontFamily:"monospace",fontSize:12,fontWeight:800,color:P}}>{a.id}</span>
 </div>
 )}

 {!isUnlocked ? (
 <div style={{padding:24}}>
 <div style={{textAlign:"center",marginBottom:18}}>
 <div style={{fontSize:36,marginBottom:10}}>🔐</div>
 <p style={{fontSize:13,color:"#6b7280",margin:0}}>Enter your 4-digit PIN to view appointment details</p>
 </div>
 <div style={{display:"flex",gap:10,maxWidth:300,margin:"0 auto"}}>
 <input
 type="text"
 inputMode="numeric"
 maxLength={4}
 placeholder="• • • •"
 value={pinInputs[a.id]||""}
 onChange={e=>handlePinInput(a.id,e.target.value)}
 onKeyDown={e=>e.key==="Enter"&&verifyPin(a)}
 style={{flex:1,border:`2px solid ${pinErrors[a.id]?"#f87171":"#d1d5db"}`,borderRadius:12,padding:"13px",fontSize:22,textAlign:"center",outline:"none",letterSpacing:10,fontWeight:800,color:P,background:"#f9fafb"}}
 />
 <button onClick={()=>verifyPin(a)} style={{padding:"13px 18px",background:P,color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",flexShrink:0}}>
 Unlock
 </button>
 </div>
 {pinErrors[a.id]&&<p style={{fontSize:12,color:"#dc2626",textAlign:"center",margin:"10px 0 0"}}>⛔ {pinErrors[a.id]}</p>}
 </div>
 ) : (
 <div style={{padding:18}}>
 <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"1fr 1fr",gap:10,marginBottom:12}}>
 {[["Supplier",a.supplierName],["Date",fmtDate(a.date)],["Time",a.time],["Orders / Lines",`${a.totalOrders} / ${a.totalLines}`]].map(([k,v])=>(
 <div key={k} style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6"}}>
 <div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{k}</div>
 <div style={{fontWeight:600,fontSize:13,color:"#111827"}}>{v}</div>
 </div>
 ))}
 </div>
 {a.storageLocation&&a.storageLocation.length>0&&<div style={{marginBottom:10}}><StoreBadge loc={a.storageLocation}/></div>}
 {a.deliveryTo&&(
 <div style={{background:"#eef2ff",border:"1px solid #c7d2fe",borderRadius:10,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
 <span style={{fontSize:10,fontWeight:700,color:"#4f46e5",textTransform:"uppercase",letterSpacing:1}}>Delivery to</span>
 <span style={{fontSize:13,fontWeight:700,color:"#312e81",fontFamily:"monospace"}}>{a.deliveryTo}</span>
 <span style={{fontSize:12,color:"#6366f1"}}>{(SBUS.find(s=>s.code===a.deliveryTo)||{}).name||""}</span>
 </div>
 )}
 {a.attachments&&a.attachments.length>0&&(
 <div style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6",marginBottom:10}}>
 <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>Attachments</div>
 <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
 {a.attachments.map(file=>(
 <span key={file.name} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#e0e7ff",color:"#3730a3",fontSize:11,fontWeight:600,padding:"3px 9px",borderRadius:8,border:"1px solid #c7d2fe"}}>
 📎 {file.name}
 </span>
 ))}
 </div>
 </div>
 )}
 {a.status==="rejected"&&a.managerComments&&(
 <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:12,padding:"12px 14px"}}>
 <div style={{fontSize:10,fontWeight:700,color:"#ef4444",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Rejection Reason</div>
 <p style={{fontSize:13,color:"#991b1b",margin:0}}>{a.managerComments}</p>
 </div>
 )}
 </div>
 )}
 </div>
 );
 })}
 </div>
 </div>
 );
}

 function togStat(s){setStatFs(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);}

 const sc={pending:"#f59e0b",approved:"#10b981",rejected:"#ef4444"};

function CalendarView({ appointments, isMobile }) {
 const TODAY = new Date();
 const [view,setView]=useState("monthly");
 const [cur,setCur]=useState(new Date());
 const [sel,setSel]=useState(null);
 const approved = appointments.filter(a=>a.status==="approved");
 const DAY_FULL = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
 const DAY_SHORT = ["S","M","T","W","T","F","S"];

 function isFriSat(d){ const day=d.getDay(); return day===5||day===6; }
 function isToday(d){ return dsOf(d)===dsOf(TODAY); }
 function forDate(d){ return approved.filter(a=>a.date===dsOf(d)).sort((a,b)=>a.time.localeCompare(b.time)); }
 function weekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}

 function navigate(dir){
 setCur(c=>{
 if(view==="daily") return addDays(c,dir);
 if(view==="weekly") return addDays(c,dir*7);
 return new Date(c.getFullYear(),c.getMonth()+dir,1);
 });
 }

 function calTitle(){
 if(view==="monthly") return cur.toLocaleString("default",{month:"long",year:"numeric"});
 if(view==="daily") return cur.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
 const ws=weekStart(cur), we=addDays(ws,6);
 return ws.getMonth()===we.getMonth()
 ? ws.getDate()+"–"+we.getDate()+" "+ws.toLocaleString("default",{month:"long",year:"numeric"})
 : ws.getDate()+" "+ws.toLocaleString("default",{month:"short"})+" – "+we.getDate()+" "+we.toLocaleString("default",{month:"short",year:"numeric"});
 }

function EmailLog({ emailLog, isMobile }) {
 const [searchQ, setSearchQ] = useState("");
 const [expandedApt, setExpandedApt] = useState(null);
 const [expandedEmail, setExpandedEmail] = useState(null);

 const typeCfg = {
 submission: {bg:"#eff6ff",color:"#1d4ed8",border:"#bfdbfe",label:"📨 Submission"},
 approval: {bg:"#f0fdf4",color:"#15803d",border:"#bbf7d0",label:"✅ Approval"},
 rejection: {bg:"#fef2f2",color:"#b91c1c",border:"#fecaca",label:"❌ Rejection"},
 };

 // Group emails by appointment ID
 const grouped = useMemo(() => {
 const groups = {};
 emailLog.forEach(e => {
 if (!groups[e.appointmentId]) {
 groups[e.appointmentId] = [];
 }
 groups[e.appointmentId].push(e);
 });
 // Sort each group by timestamp (newest first)
 Object.keys(groups).forEach(aptId => {
 groups[aptId].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
 });
 return groups;
 }, [emailLog]);

 // Filter groups by search query
 const filteredGroups = useMemo(() => {
 const q = searchQ.toLowerCase();
 if (!q) return Object.keys(grouped).sort((a,b) => {
 const aLatest = new Date(grouped[a][0]?.timestamp);
 const bLatest = new Date(grouped[b][0]?.timestamp);
 return bLatest - aLatest;
 });

 return Object.keys(grouped).filter(aptId => {
 const emails = grouped[aptId];
 return aptId.toLowerCase().includes(q) || 
 emails.some(e => 
 e.subject.toLowerCase().includes(q) || 
 e.recipient.toLowerCase().includes(q)
 );

function DonutChart({ segments, size=120, stroke=18 }) {
 const r = (size - stroke) / 2;
 const circ = 2 * Math.PI * r;
 const total = segments.reduce((s, x) => s + x.value, 0) || 1;
 let offset = 0;
 return (
 <svg width={size} height={size} viewBox={"0 0 "+size+" "+size} style={{transform:"rotate(-90deg)"}}>
 <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
 {segments.map((seg, i) => {
 const dash = (seg.value / total) * circ;
 const gap = circ - dash;
 const el = (
 <circle key={i} cx={size/2} cy={size/2} r={r} fill="none"
 stroke={seg.color} strokeWidth={stroke}
 strokeDasharray={dash+" "+gap}
 strokeDashoffset={-offset}
 strokeLinecap="round"/>
 );
 offset += dash;
 return el;
 })}
 </svg>
 );
}

function TransactionsHistory({ transactions, isMobile }) {

 const [actionFilter,setActionFilter]=useState("all");
 const [actorFilter,setActorFilter]=useState("");
 const [dFrom,setDFrom]=useState("");
 const [dTo,setDTo]=useState("");

 const actionCfg={
 create:{bg:"#eff6ff",color:"#1d4ed8",border:"#bfdbfe",label:"📝 Created",icon:"📝"},
 approve:{bg:"#f0fdf4",color:"#15803d",border:"#bbf7d0",label:"✅ Approved",icon:"✅"},
 reject:{bg:"#fef2f2",color:"#b91c1c",border:"#fecaca",label:"❌ Rejected",icon:"❌"},
 };

 const uniqueActors=useMemo(()=>{
 const set=new Set();
 transactions.forEach(t=>{if(t.actorEmail&&t.actorEmail!=="—")set.add(t.actorEmail);});
 return Array.from(set).sort();
 },[transactions]);

 const filtered=useMemo(()=>{
 return transactions.filter(t=>{
 if(actionFilter!=="all"&&t.action!==actionFilter)return false;
 if(actorFilter&&t.actorEmail!==actorFilter)return false;
 if(dFrom&&t.timestamp.split("T")[0]<dFrom)return false;
 if(dTo&&t.timestamp.split("T")[0]>dTo)return false;
 if(searchQ){
 const q=searchQ.toLowerCase();
 if(!t.appointmentId.toLowerCase().includes(q)&&!t.actorEmail.toLowerCase().includes(q)&&!t.actor.toLowerCase().includes(q)&&!(t.supplierName||"").toLowerCase().includes(q)&&!(t.details||"").toLowerCase().includes(q))return false;
 }
 return true;
 }).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
 },[transactions,searchQ,actionFilter,actorFilter,dFrom,dTo]);

 const counts={create:0,approve:0,reject:0};
 transactions.forEach(t=>{if(counts[t.action]!==undefined)counts[t.action]++;});

 function exportCSV(){
 const rows=[["Timestamp","Action","Actor","Email","Appointment ID","Supplier","Delivery To","Details"]];
 filtered.forEach(t=>rows.push([fmtTs(t.timestamp),t.action,t.actor,t.actorEmail,t.appointmentId,t.supplierName||"",t.deliveryTo||"",t.details||""]));
 const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
 const blob=new Blob([csv],{type:"text/csv"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url;a.download=`transactions_${todayStr()}.csv`;
 document.body.appendChild(a);a.click();a.remove();
 URL.revokeObjectURL(url);
 }

 ) : isMobile ? (

 const [appts,setAppts]=useState(()=>{
 try{const s=localStorage.getItem(LS_APPTS);return s?JSON.parse(s):[];}catch{return [];}
 });
 const [emailLog,setEmailLog]=useState(()=>{
 try{const s=localStorage.getItem(LS_EMAILS);return s?JSON.parse(s):[];}catch{return [];}
 });
 const [config,setConfig]=useState(()=>{
 try{const s=localStorage.getItem(LS_CONFIG);return s?JSON.parse(s):{serviceId:"",templateId:"",publicKey:"",adminEmail:""};}catch{return {serviceId:"",templateId:"",publicKey:"",adminEmail:""};}
 });
 const [transactions,setTransactions]=useState(()=>{
 try{const s=localStorage.getItem(LS_TRANSACTIONS);return s?JSON.parse(s):[];}catch{return [];}
 });

 // === FIREBASE REAL-TIME SYNC + AUTO-MIGRATION ===
 useEffect(()=>{
   if(!window.db) return;
   let migrated=false;
   // Real-time listener for appointments (1 subscription = minimal reads)
   const unsubAppts=window.db.collection("appointments").onSnapshot(async snap=>{
     const cloudAppts=snap.docs.map(d=>d.data());
     // Auto-migrate localStorage data ONCE if cloud is empty and local has data
     if(!migrated && cloudAppts.length===0){
       migrated=true;
       try{
         const localAppts=JSON.parse(localStorage.getItem(LS_APPTS)||"[]");
         if(localAppts.length>0){
           const batch=window.db.batch();
           localAppts.forEach(a=>batch.set(window.db.collection("appointments").doc(a.id),a));
           await batch.commit();
           console.log("✅ Migrated",localAppts.length,"appointments to Firebase");
           return; // listener will fire again with new data
         }
       }catch(e){console.error("Migration error:",e);}
     }
     setAppts(cloudAppts.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)));
   },err=>console.error("Appts listener:",err));

   // Real-time listener for emails
   const unsubEmails=window.db.collection("emails").onSnapshot(async snap=>{
     const cloudEmails=snap.docs.map(d=>d.data());
     if(cloudEmails.length===0){
       try{
         const localEmails=JSON.parse(localStorage.getItem(LS_EMAILS)||"[]");
         if(localEmails.length>0){
           const batch=window.db.batch();
           localEmails.forEach(e=>batch.set(window.db.collection("emails").doc(String(e.id)),e));
           await batch.commit();
           console.log("✅ Migrated",localEmails.length,"emails to Firebase");
           return;
         }
       }catch(e){console.error("Email migration:",e);}
     }
     setEmailLog(cloudEmails.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)));
   },err=>console.error("Emails listener:",err));

   return ()=>{unsubAppts();unsubEmails();};
 },[]);

 // Firebase listener for transactions (separate effect for safe addition)
 useEffect(()=>{
   if(!window.db) return;
   const unsubTx=window.db.collection("transactions").onSnapshot(async snap=>{
     const cloudTx=snap.docs.map(d=>d.data());
     if(cloudTx.length===0){
       try{
         const localTx=JSON.parse(localStorage.getItem(LS_TRANSACTIONS)||"[]");
         if(localTx.length>0){
           const batch=window.db.batch();
           localTx.forEach(t=>batch.set(window.db.collection("transactions").doc(String(t.id)),t));
           await batch.commit();
           return;
         }
       }catch(e){console.error("Tx migration:",e);}
     }
     setTransactions(cloudTx.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)));
   },err=>console.error("Tx listener:",err));
   return ()=>unsubTx();
 },[]);

 // Keep localStorage as backup
 useEffect(()=>{try{localStorage.setItem(LS_APPTS,JSON.stringify(appts));}catch(e){}},[appts]);
 useEffect(()=>{try{localStorage.setItem(LS_EMAILS,JSON.stringify(emailLog));}catch(e){}},[emailLog]);
 useEffect(()=>{try{localStorage.setItem(LS_CONFIG,JSON.stringify(config));}catch(e){}},[config]);

 <div style={{width:220,background:"rgba(7,17,76,0.98)",display:"flex",flexDirection:"column",padding:12,boxShadow:"4px 0 20px rgba(0,0,0,0.4)"}}>
 <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
 <span style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600}}>Navigation</span>
 <button onClick={()=>setNavOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.4)",fontSize:18}}>×</button>
 </div>
 {nav.map(item=>(
 <button key={item.id} onClick={()=>{setView(item.id);setNavOpen(false);}}
 style={{display:"flex",alignItems:"center",gap:10,padding:"12px 10px",borderRadius:10,border:"none",cursor:"pointer",background:view===item.id?A:"transparent",color:view===item.id?"#fff":"rgba(255,255,255,0.55)",fontWeight:500,fontSize:14,marginBottom:4,textAlign:"left"}}>
 <span style={{fontSize:16}}>{item.icon}</span>
 <span style={{flex:1}}>{item.label}</span>
 {item.badge>0 && <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:99}}>{item.badge}</span>}
 </button>
 ))}
 </div>
 <div onClick={()=>setNavOpen(false)} style={{flex:1,background:"rgba(0,0,0,0.5)"}}/>
 </div>
 )
 ) : (
 <aside style={{width:isTablet?56:200,background:"rgba(7,17,76,0.97)",borderRight:"1px solid rgba(255,255,255,0.08)",display:"flex",flexDirection:"column",flexShrink:0}}>
 <nav style={{flex:1,padding:8,display:"flex",flexDirection:"column",gap:2}}>
 {nav.map(item=>(
 <button key={item.id} onClick={()=>setView(item.id)} title={isTablet?item.label:undefined}
 style={{display:"flex",alignItems:"center",gap:isTablet?0:10,padding:"11px",borderRadius:10,border:"none",cursor:"pointer",background:view===item.id?A:"transparent",color:view===item.id?"#fff":"rgba(255,255,255,0.45)",fontWeight:500,fontSize:13,justifyContent:isTablet?"center":"flex-start",position:"relative"}}>
 <span style={{fontSize:15}}>{item.icon}</span>
 {!isTablet && <span style={{flex:1,textAlign:"left"}}>{item.label}</span>}
 {!isTablet && item.badge>0 && <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:99}}>{item.badge}</span>}
 {isTablet && item.badge>0 && <span style={{position:"absolute",top:6,right:6,width:7,height:7,borderRadius:"50%",background:"#fbbf24"}}/>}
 </button>
 ))}
 </nav>
 </aside>
 )}

 <main style={{flex:1,overflowY:"auto",background:BG,display:"flex",flexDirection:"column"}}>
 <OrgFilter value={orgFilter} onChange={setOrgFilter} isMobile={isMobile}/>
 <div style={{flex:1}}>
 {view==="dashboard" && <Dashboard appointments={filteredAppts} setView={setView} isMobile={isMobile}/>}
 {view==="admin" && <AdminPanel appointments={filteredAppts} onApprove={handleApprove} onReject={id=>{setRejectId(id);setRejReason("");}} onView={setViewId} loading={loading} isMobile={isMobile}/>}
 {view==="statistics" && <StatisticsPanel appointments={filteredAppts} isMobile={isMobile}/>}
 {view==="calendar" && <CalendarView appointments={filteredAppts} isMobile={isMobile}/>}
 {view==="emails" && <EmailLog emailLog={orgFilter==="BE"?emailLog:emailLog.filter(e=>(e.appointmentId||"").startsWith(orgFilter+"-"))} isMobile={isMobile}/>}
 {view==="history" && <TransactionsHistory transactions={orgFilter==="BE"?transactions:transactions.filter(t=>(t.appointmentId||"").startsWith(orgFilter+"-"))} isMobile={isMobile}/>}
 {view==="settings" && <SettingsPanel config={config} onChange={setConfig} isMobile={isMobile}/>}
 </div>
 <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",padding:isMobile?"12px 16px":"12px 28px",display:"flex",alignItems:"center",flexWrap:"wrap",gap:isMobile?10:24,justifyContent:"space-between"}}>
 <span style={{color:"rgba(255,255,255,0.3)",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,flexShrink:0}}>Support</span>
 <div style={{display:"flex",flexWrap:"wrap",gap:isMobile?10:20,alignItems:"center"}}>
 {[
 {icon:"📧",value:"Faisal.Janahi@Bapcoenergies.com",href:"mailto:Faisal.Janahi@Bapcoenergies.com"},
 {icon:"📱",value:"+973 6667 6797",href:"tel:+97366676797"},
 {icon:"📞",value:"17757483",href:"tel:17757483"},
 ].map(({icon,value,href})=>(
 <a key={value} href={href} style={{display:"flex",alignItems:"center",gap:6,textDecoration:"none",color:"rgba(255,255,255,0.45)",fontSize:12,fontWeight:500}}>
 <span style={{fontSize:13}}>{icon}</span>
 <span style={{color:"rgba(255,255,255,0.55)"}}>{value}</span>
 </a>
 ))}
 </div>
 </div>
 </main>
 </div>

 {toast && (
 <div style={{position:"fixed",bottom:isMobile?20:undefined,top:isMobile?undefined:16,right:16,left:isMobile?16:undefined,zIndex:99,background:P,color:"#fff",padding:"12px 16px",borderRadius:14,fontSize:13,boxShadow:"0 8px 30px rgba(0,0,0,0.3)",display:"flex",alignItems:"center",gap:10}}>
 <span style={{flex:1}}>{toast}</span>
 <button onClick={()=>setToast(null)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:16}}>×</button>
 </div>
 )}

 {rejectId && (
 <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:40,padding:isMobile?0:16}}>
 <div style={{background:"#fff",borderRadius:isMobile?"24px 24px 0 0":"24px",padding:22,width:"100%",maxWidth:isMobile?"100%":420}}>
 <h3 style={{fontWeight:800,fontSize:18,color:P,margin:"0 0 4px"}}>Reject Appointment</h3>
 <p style={{fontSize:13,color:"#6b7280",margin:"0 0 14px"}}>Supplier will be notified with this reason.</p>
 <label style={{display:"block",fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Manager Comments *</label>
 <textarea value={rejReason} onChange={e=>setRejReason(e.target.value)} placeholder="e.g. The requested time slot is fully booked." autoFocus style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:12,padding:12,fontSize:14,resize:"none",height:100,outline:"none",boxSizing:"border-box",background:"#f9fafb"}}/>
 <div style={{display:"flex",gap:10,marginTop:14}}>
 <button onClick={()=>setRejectId(null)} style={{flex:1,padding:12,border:"1px solid #e5e7eb",borderRadius:12,fontSize:14,fontWeight:600,color:"#6b7280",background:"transparent",cursor:"pointer"}}>Cancel</button>
 <button onClick={handleRejectSubmit} disabled={!rejReason.trim()} style={{flex:1,padding:12,background:"#dc2626",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",opacity:!rejReason.trim()?0.4:1}}>Reject & Notify</button>
 </div>
 </div>
 </div>
 )}

 {viewApt && (
 <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",zIndex:40,padding:isMobile?0:16}}>
 <div style={{background:"#fff",borderRadius:isMobile?"24px 24px 0 0":"24px",padding:22,width:"100%",maxWidth:isMobile?"100%":460,maxHeight:isMobile?"85vh":"85vh",overflowY:"auto"}}>
 <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
 <div>
 <div style={{fontFamily:"monospace",fontSize:12,color:P,fontWeight:800,marginBottom:4}}>{viewApt.id}</div>
 <h3 style={{fontWeight:800,fontSize:17,color:P,margin:"0 0 2px"}}>{viewApt.supplierName}</h3>
 <p style={{fontSize:12,color:"#6b7280",margin:0}}>{viewApt.supplierEmail}</p>
 </div>
 <div style={{display:"flex",alignItems:"center",gap:8}}>
 <StatusBadge status={viewApt.status}/>
 <button onClick={()=>setViewId(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#9ca3af"}}>×</button>
 </div>
 </div>
 <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
 {[["Date",fmtDate(viewApt.date)],["Time",viewApt.time],["Orders",viewApt.totalOrders],["Lines",viewApt.totalLines]].map(([k,v])=>(
 <div key={k} style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6"}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>{k}</div><div style={{fontWeight:600,fontSize:13,color:"#111827"}}>{v}</div></div>
 ))}
 </div>
 <div style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6",marginBottom:10}}>
 <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>Storage Location</div>
 <StoreBadge loc={viewApt.storageLocation}/>
 </div>
 {viewApt.deliveryTo && (
 <div style={{background:"#eef2ff",border:"1px solid #c7d2fe",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
 <div style={{fontSize:11,color:"#4f46e5",fontWeight:600,marginBottom:3}}>Delivery To (SBU)</div>
 <div style={{fontSize:13,fontWeight:700,color:"#312e81"}}>{viewApt.deliveryTo} – {(SBUS.find(s=>s.code===viewApt.deliveryTo)||{}).name||"Unknown"}</div>
 </div>
 )}
 {viewApt.poNumbers&&viewApt.poNumbers.length>0&&(
 <div style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6",marginBottom:10}}>
 <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>PO Numbers</div>
 <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
 {viewApt.poNumbers.map(p=><span key={p} style={{background:"#eef2ff",border:"1px solid #c7d2fe",color:"#3730a3",fontSize:12,fontWeight:700,padding:"3px 9px",borderRadius:8}}>#{p}</span>)}
 </div>
 </div>
 )}
 {viewApt.offloadingEquipment&&viewApt.offloadingEquipment.length>0&&(
 <div style={{background:"#fffbeb",borderRadius:10,padding:"10px 12px",border:"1px solid #fde68a",marginBottom:10}}>
 <div style={{fontSize:11,color:"#d97706",marginBottom:3}}>Equipment</div>
 <div style={{fontSize:13,fontWeight:600,color:"#92400e"}}>{viewApt.offloadingEquipment.join(", ")}</div>
 </div>
 )}
 {viewApt.attachments&&viewApt.attachments.length>0&&(
 <div style={{background:"#f0f9ff",borderRadius:10,padding:"10px 12px",border:"1px solid #bae6fd",marginBottom:10}}>
 <div style={{fontSize:11,color:"#0369a1",marginBottom:6,fontWeight:600}}>📎 Attachments ({viewApt.attachments.length})</div>
 <div style={{display:"flex",flexDirection:"column",gap:5}}>
 {viewApt.attachments.map(file=>(
 <div key={file.name} style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#374151"}}>
 <span>{file.type&&file.type.includes("pdf")?"📄":file.type&&file.type.includes("image")?"🖼️":"📎"}</span>
 <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{file.name}</span>
 <span style={{fontSize:11,color:"#9ca3af",flexShrink:0}}>{fmtBytes(file.size)}</span>
 </div>
 ))}
 </div>
 </div>
 )}
 {viewApt.additionalNotes&&<div style={{background:"#f9fafb",borderRadius:10,padding:"10px 12px",border:"1px solid #f3f4f6",marginBottom:10}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:3}}>Notes</div><div style={{fontSize:13,color:"#374151"}}>{viewApt.additionalNotes}</div></div>}
 {viewApt.managerComments&&<div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 12px",marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:"#ef4444",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Manager Comments</div><div style={{fontSize:13,color:"#991b1b"}}>{viewApt.managerComments}</div></div>}
 <button onClick={()=>setViewId(null)} style={{width:"100%",padding:12,border:"1px solid #e5e7eb",borderRadius:12,fontSize:14,fontWeight:600,color:"#6b7280",background:"transparent",cursor:"pointer",marginTop:4}}>Close</button>
 </div>
 </div>
 )}
 </div>
 );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
 </script>
 <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
 <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
 <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
 <script>
 try {
 var code = document.getElementById("app-code").textContent;
 var result = Babel.transform(code, { presets: ["react"] });
 new Function(result.code)();
 } catch(e) {
 console.error("App error:", e);
 document.getElementById("root").innerHTML =
 "<div style=\"display:flex;align-items:center;justify-content:center;height:100vh;background:#07114C;color:white;font-family:sans-serif;padding:20px;text-align:center;\">" +
 "<div><div style=\"font-size:48px;margin-bottom:16px\">\u26a0\ufe0f</div>" +
 "<div style=\"font-size:18px;font-weight:bold;margin-bottom:8px\">Failed to load</div>" +
 "<div style=\"opacity:0.6;font-size:14px\">" + e.message + "</div></div></div>";
 }
 </script>
</body>
</html>
